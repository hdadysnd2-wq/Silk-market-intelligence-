<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>منصة سِلك · ذكاء الأسواق</title>

<style>
  /* Silk Enterprise Design System — Carbon × Redwood · bilingual · light+dark */
  :root{
    --bg:#F4F4F4;--surface:#FFFFFF;--surface-2:#F7F7F7;--hover:#E8E8E8;

  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#161616;--surface:#262626;--surface-2:#2C2C2C;--hover:#333333;--border:#393939;--border-strong:#525252;
    --text:#F4F4F4;--text-2:#C6C6C6;--text-3:#A8A8A8;--primary:#4589FF;--primary-hover:#78A9FF;--primary-active:#A6C8FF;
    --primary-soft:#1F2A44;--brand:#FF8A75;--brand-soft:#2E1F1B;--success:#42BE65;--success-soft:#1A2E20;
    --warning:#F1C21B;--warning-soft:#332C0E;--danger:#FA4D56;--danger-soft:#341A1C;--info:#4589FF;--info-soft:#1F2A44;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);--shadow-lg:0 2px 8px rgba(0,0,0,.5),0 20px 48px rgba(0,0,0,.6);
  }}
  :root[data-theme="dark"]{
    --bg:#161616;--surface:#262626;--surface-2:#2C2C2C;--hover:#333333;--border:#393939;--border-strong:#525252;
    --text:#F4F4F4;--text-2:#C6C6C6;--text-3:#A8A8A8;--primary:#4589FF;--primary-hover:#78A9FF;--primary-active:#A6C8FF;
    --primary-soft:#1F2A44;--brand:#FF8A75;--brand-soft:#2E1F1B;--success:#42BE65;--success-soft:#1A2E20;

  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--ar);font-size:16px;line-height:1.5;
    -webkit-font-smoothing:antialiased;transition:background .3s var(--ease),color .3s var(--ease)}
  html[lang="en"] body{font-family:var(--en)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
  button{font-family:inherit;cursor:pointer;color:inherit}
  a{color:var(--primary);text-decoration:none}
  :focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
  .hidden{display:none!important}

  .brand .t{font-size:18px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand .s{font-size:13px;color:var(--text-3)}
  @media(max-width:560px){.appbar-row{gap:var(--s2)}.brand .t{font-size:15px}

  .drop{position:absolute;top:calc(100% + 6px);inset-inline:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:40;max-height:320px;overflow-y:auto}

  .drow:last-child{border-bottom:0}.drow:hover{background:var(--hover)}.drow .nm{font-size:15px;font-weight:500}
  .myprod{display:grid;grid-template-columns:1fr;gap:var(--s3);padding:var(--s5);margin-bottom:var(--s5);border-inline-start:4px solid var(--brand)}
  .mp-econ{display:flex;flex-wrap:wrap;gap:var(--s4)}

  .gauge{width:180px;height:180px;border-radius:50%;display:grid;place-items:center;margin-inline:auto;background:conic-gradient(var(--primary) calc(var(--p,0)*1%),var(--border) 0)}
  .gauge .in{width:142px;height:142px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .gauge .n{font-family:var(--mono);font-size:36px;font-weight:600;line-height:1}.gauge .l{font-size:13px;color:var(--text-3);margin-top:4px}
  .d-actions{display:flex;gap:var(--s3);flex-wrap:wrap;margin-top:var(--s5)}
  .pipe{padding:var(--s5) var(--s6)}

  .status{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:7px 14px;border-radius:40px}

  .status.run{background:var(--primary-soft);color:var(--primary)}.status.idle{background:var(--surface-2);color:var(--text-2)}
  .status .dot{width:8px;height:8px;border-radius:50%;background:currentColor}.run .dot{animation:pulse 1s infinite}
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--s3)}
  @media(max-width:860px){.steps{grid-template-columns:repeat(2,1fr)}}
  .step{padding:var(--s4);border-radius:var(--r-lg);background:var(--surface-2);border:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .step.gap{background:var(--warning-soft);border-color:transparent}
  .step .sn{display:flex;align-items:center;gap:8px}.step .sn b{font-size:15px;font-weight:600}
  .step .num-badge{width:24px;height:24px;border-radius:6px;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;flex:none}
  .step .sd{font-size:13px;color:var(--text-3);line-height:1.45}
  .step .sf{display:flex;align-items:center;gap:7px;font-size:13px;margin-top:2px}.step .sf .dot{width:7px;height:7px;border-radius:50%;flex:none}.step .sf b{font-family:var(--mono)}
  .body-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--s4);align-items:start}
  @media(max-width:960px){.body-grid{grid-template-columns:1fr}}
  /* U2: أبناء الشبكة min-width:0 كي ينكمش الجدول العريض بدل دفع تمرير أفقي للصفحة */
  .body-grid>*,.duo>*{min-width:0}
  table.dt tbody tr:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
  .dt-head{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--s5);border-bottom:1px solid var(--border)}
  .dt-head h3{margin:0;font-size:18px;font-weight:600}.dt-head .cnt{font-size:14px;color:var(--text-3)}
  table.dt{width:100%;border-collapse:collapse}

  table.dt td{padding:14px var(--s5);border-bottom:1px solid var(--border);font-size:15px;vertical-align:middle}
  table.dt tbody tr{cursor:pointer;transition:background .12s var(--ease)}
  table.dt tbody tr:hover{background:var(--hover)}table.dt tr.sel{background:var(--primary-soft);box-shadow:inset 3px 0 0 var(--primary)}
  .rk{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--primary)}
  .cty{display:flex;align-items:center;gap:10px}
  .flag{font-family:var(--mono);font-size:12px;background:var(--surface-2);border:1px solid var(--border);padding:3px 7px;border-radius:5px;color:var(--text-2);direction:ltr}

  .bar{display:flex;align-items:center;gap:10px}.bar .bv{font-family:var(--mono);font-weight:600;color:var(--primary);min-width:26px}
  .bar .track{flex:1;min-width:50px;height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden}.bar .fill{height:100%;background:var(--primary);border-radius:5px}

  .detail{position:sticky;top:80px}.dpad{padding:var(--s5)}

  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:var(--s4) 0;overflow-x:auto}
  .tab{padding:12px 14px;font-size:14px;font-weight:600;color:var(--text-2);background:transparent;border:0;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s var(--ease)}

  .panel-body{animation:slideup .25s var(--ease) both}
  .mypos{background:var(--brand-soft);border-radius:var(--r-lg);padding:var(--s4);margin-bottom:var(--s4)}
  .mypos h4{margin:0 0 6px;font-size:15px;font-weight:700;color:var(--brand)}.mypos .big{font-size:15px;line-height:1.7}.mypos b{font-family:var(--mono)}
  .comp{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
  .comp-h{display:flex;align-items:center;justify-content:space-between;gap:10px}.comp-nm{font-size:15px;font-weight:600}.comp-w{font-size:13px;color:var(--text-3)}

  .ladder{width:100%;border-collapse:collapse;margin-top:6px}

  function pipeHTML(){
    var stCls,stTxt;

    else{var top=(S.raw.markets||[])[0],j=top&&top.jury;if(j&&j.agents_with_data>0){stCls="ok";stTxt=t("completeCov")+" "+j.agents_with_data+"/"+j.agents_total+" "+t("agents");}else{stCls="warn";stTxt=t("completeGaps");}}
    var steps=STEPS.map(function(s,i){
      var col="var(--text-3)",cls="",foot=S.raw?"—":"—";
      if(!S.raw){}
      else if(i===0){if(S.raw.hs_code){col="var(--success)";foot="<b class='num'>"+esc(S.raw.hs_code)+"</b> · "+esc(S.raw.hs_confidence);}else{col="var(--warning)";cls="gap";foot=t("declaredGap");}}
      else if(i===4){var top=(S.raw.markets||[])[0],j=top&&top.jury;if(j){col=j.agents_with_data>0?"var(--primary)":"var(--warning)";cls=j.agents_with_data>0?"":"gap";foot=(S.lang==="ar"?"مرحلة ":"stage ")+(j.synthesis_stage||1);}}
      else{var cov=coverage(s[2]);if(cov.n>0){col="var(--success)";foot="<b class='num'>"+cov.n+"/"+cov.total+"</b> "+t("obs");}else{col="var(--warning)";cls="gap";foot=t("declaredGap");}}
      return '<div class="step '+cls+'"><div class="sn"><span class="num-badge">'+(i+1)+'</span><b>'+esc(t(s[0]))+'</b></div><div class="sd">'+esc(t(s[1]))+'</div><div class="sf"><span class="dot" style="background:'+col+'"></span><span>'+foot+'</span></div></div>';
    }).join("");
    return '<section class="card pipe'+(S.running?" run":"")+'"><div class="pipe-head"><div class="eyebrow">'+esc(t("pipeline"))+'</div><span class="status '+stCls+'"><span class="dot"></span>'+esc(stTxt)+'</span></div><div class="steps">'+steps+'</div></section>';

  function renderCompleteness(){

  function margin(price){var cost=S.card.cost_per_unit,ship=S.card.shipping_per_unit||0;if(cost==null||!price||price<=0)return null;return Math.round((price-cost-ship)/price*100);}

  function verdictTab(sel){
    var out="",j=sel.jury;
    if(j)out+='<div class="comp"><div class="comp-h"><span class="badge b-info">'+esc(t("juryTitle"))+'</span><span class="prov" style="margin:0">'+esc(t("coverageL"))+' '+esc(j.agents_with_data)+'/'+esc(j.agents_total)+' · '+esc(j.confidence)+'</span></div><div style="margin-top:8px;font-size:15px;line-height:1.6">'+esc(j.verdict||"")+'</div>'+((j.data_gaps||[]).length?'<div class="prov" style="margin-top:6px">'+esc(t("gapsL"))+': '+esc(j.data_gaps.join(", "))+'</div>':'')+'</div>';
    var a=sel.ai;
    if(a){var vm={"GO":"b-go","WATCH":"b-watch","NO-GO":"b-no"},cls=vm[(a.verdict||"").toUpperCase()]||"b-info";out+='<div class="comp" style="background:var(--primary-soft);border-color:transparent"><div class="comp-h"><span class="badge b-info">'+esc(t("claudeJudge"))+'</span><span class="badge '+cls+'">'+esc(a.verdict||"")+'</span></div>'+(a.reasoning?'<div style="margin-top:8px;font-size:15px;line-height:1.7">'+esc(a.reasoning)+'</div>':'')+'</div>';}
    if(sel.recommendation)out+='<div class="callout">'+esc(sel.recommendation)+'</div>';
    return out||'<div class="callout">'+esc(t("notObserved"))+'</div>';
  }
  function duoBlock(){
    var v=S.result.view||{},limits=v.limits||[];
    var lim=limits.length?'<ul class="limits">'+limits.slice(0,8).map(function(l){return '<li>'+esc(l)+'</li>';}).join("")+'</ul>':'<div class="callout">'+esc(t("noLimits"))+'</div>';
    var cp=v.competitive_position;
    var cpb=(!cp||!cp.available)?'<div class="callout warn">'+esc((cp&&cp.note)||t("posNeed"))+'</div>':'<ul class="list">'+((cp.feasibility_threads||[]).map(function(f){return '<li>'+esc(f.competitor)+': '+esc(t("colMargin"))+' <b class="num">'+esc(f.margin_at_match_pct)+'%</b></li>';}).join("")||'<li>'+esc(t("notObserved"))+'</li>')+'</ul>';
    return '<div class="duo"><section class="card panel"><h3>'+esc(t("reportLimits"))+'</h3><div class="sub">'+esc(t("limitsSub"))+'</div>'+lim+'</section>'+
      '<section class="card panel"><h3>'+esc(t("yourPos"))+'</h3><div class="sub">'+esc((cp&&cp.market)||"")+'</div>'+cpb+'</section></div>';
  }
  function cultureBlock(){
    var v=S.result.view||{},culture=v.culture||[];
    var body;
    if(culture.length){
      body='<ul class="list">'+culture.slice(0,8).map(function(c){
        var title=esc(c.title||"");
        return '<li>'+(c.link?'<a href="'+esc(c.link)+'" target="_blank" rel="noopener noreferrer">'+title+'</a>':title)+'</li>';
      }).join("")+'</ul>';
    }else{
      body='<div class="callout warn">'+esc(t("cultureNeed"))+'</div>';
    }
    return '<section class="card panel" style="margin-top:var(--s5)"><h3>'+esc(t("cultureTitle"))+'</h3><div class="sub">'+esc(t("cultureSub"))+'</div>'+body+'</section>';
  }
  function renderReady(){
    $("#completeness").classList.add("hidden");
    if(!S.product){$("#resultArea").innerHTML='<section class="card ready"><h2>'+esc(t("readyTitle"))+'</h2><p>'+esc(t("readyP"))+'</p><div class="foot">'+esc(t("readyFoot"))+'</div></section>';return;}
    $("#resultArea").innerHTML='<section class="card ready"><span class="hs-chip">HS '+esc(S.hs)+'</span><h2 style="margin-top:12px">'+esc(S.product)+'</h2><p>'+esc(t("readyProduct"))+'</p><button class="btn btn-primary" onclick="document.getElementById(\'runBtn\').click()">'+esc(t("analyze"))+'</button></section>';
  }

  function exportJson(){var raw=S.raw;if(!raw)return;var a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(raw,null,2));a.download="silk_"+(S.product||"analysis")+".json";a.click();}
  function exportCsv(){if(!S.result||!S.result.classified)return;var rows=[["rank","country","code","import_usd","saudi_share_pct","score","confidence","growth_pct"]];S.result.markets.forEach(function(m,i){rows.push([i+1,m.country,m.code,m.import_value,m.saudi_share,m.score,m.confidence,m.trend&&m.trend.growth_pct]);});var csv=rows.map(function(r){return r.map(function(x){return x==null?"":'"'+String(x).replace(/"/g,'""')+'"';}).join(",");}).join("\n");var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="silk_"+(S.product||"report")+".csv";a.click();}

  var FREE=[{k:null,nm:{ar:"UN Comtrade",en:"UN Comtrade"},ds:{ar:"الاستيراد/التصدير بالـ HS — العمود الفقري.",en:"HS imports/exports — the backbone."}},
    {k:null,nm:{ar:"World Bank",en:"World Bank"},ds:{ar:"الدخل، القوة الشرائية، السكان.",en:"Income, PPP, population."}},
    {k:null,nm:{ar:"مرجع الاشتراطات L1",en:"Requirements L1 reference"},ds:{ar:"اشتراطات دخول/خروج بمصادرها الرسمية.",en:"Entry/exit requirements with official sources."}},
    {k:null,nm:{ar:"Google Trends",en:"Google Trends"},ds:{ar:"الطلب والموسمية — مفعّل دائماً من الخادم.",en:"Demand & seasonality — always on (server)."}},
    {k:null,nm:{ar:"WITS / WTO",en:"WITS / WTO"},ds:{ar:"الرسوم المطبّقة — بلا مفتاح، مفعّل دائماً.",en:"Applied tariffs — keyless, always on."}},
    {k:null,nm:{ar:"FAOSTAT",en:"FAOSTAT"},ds:{ar:"الاستهلاك للفرد — بلا مفتاح، مفعّل دائماً.",en:"Per-capita supply — keyless, always on."}},
    {k:"MAPS",nm:{ar:"Google Maps",en:"Google Maps"},ds:{ar:"المصانع والموزّعون بأسمائهم.",en:"Named factories & distributors."}},
    {k:"SEARCH",nm:{ar:"بحث الويب (Serper)",en:"Web Search (Serper)"},ds:{ar:"ثقافة المستهلك ونبض السوق — عناوين ومقالات مرصودة.",en:"Consumer culture & market pulse — observed headlines & articles."}}];
  var PAID=[{k:"LOCALPRICE",nm:{ar:"أسعار السوق المحلي",en:"Local market prices"},ds:{ar:"أسعار الرفّ الفعلية (أمازون/نون/جوميا) + مقارنة سعرك.",en:"Real shelf prices (Amazon/Noon/Jumia) + your price comparison."}},
    {k:"VOLZA",nm:{ar:"Volza",en:"Volza"},ds:{ar:"المستوردون بالاسم من بوالص الشحن.",en:"Named importers from shipping bills."}},
    {k:"EXPLEE",nm:{ar:"explee",en:"explee"},ds:{ar:"مشترون وجهات اتصال B2B.",en:"B2B buyers & contacts."}}];
  var AI=[{k:"CLAUDE",nm:{ar:"Claude (Anthropic)",en:"Claude (Anthropic)"},ds:{ar:"حَكَم وتلخيص ذكي فوق النتائج.",en:"AI judge & summary over results."}}];
  function srcCard(s){
    var has=s.k&&S.keys[s.k],ctrl="",badge,cls;
    if(s.tg){var on=!!S.toggles[s.tg];badge=on?t("obs"):"—";cls=on?"st-on":"st-off";ctrl='<button class="switch'+(on?" on":"")+'" data-tg="'+s.tg+'"><span class="k"></span></button>';}
    else if(s.k){badge=has?t("connected"):t("needsKey");cls=has?"st-on":"st-off";ctrl='<input class="keyin" type="password" data-key="'+s.k+'" value="'+esc(S.keys[s.k]||"")+'" placeholder="'+(s.k==="CLAUDE"?"sk-ant-…":"API key")+'" />';}
    else{badge=t("keyless");cls="st-on";}
    return '<div class="srccard"><div class="body"><div class="nm">'+esc(s.nm[S.lang])+'</div><div class="ds">'+esc(s.ds[S.lang])+'</div></div><span class="stbadge '+cls+'">'+esc(badge)+'</span>'+ctrl+'</div>';
  }
  var KEY_ENV={SEARCH:"SEARCH_API_KEY",MAPS:"GOOGLE_MAPS_API_KEY",LOCALPRICE:"LOCALPRICE_API_KEY",VOLZA:"VOLZA_API_KEY",EXPLEE:"EXPLEE_API_KEY",CLAUDE:"ANTHROPIC_API_KEY",COMTRADE:"COMTRADE_API_KEY"};
  function saveKeysToServer(){
    var payload={};Object.keys(S.keys).forEach(function(k){if(S.keys[k]&&KEY_ENV[k])payload[KEY_ENV[k]]=S.keys[k];});
    var hdrs={"Content-Type":"application/json"};if(S.adminKey)hdrs["X-API-Key"]=S.adminKey;
    fetch(base()+"/settings/keys",{method:"POST",headers:hdrs,body:JSON.stringify({keys:payload})})
      .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(function(){toast(t("saved"));})
      .catch(function(e){toast(t("reqFail")+": "+e.message);});
  }
  function renderSettings(){
    $("#settingsBody").innerHTML='<div class="sec-ttl">'+esc(t("secAI"))+'</div>'+AI.map(srcCard).join("")+'<div class="sec-ttl">'+esc(t("secFree"))+'</div>'+FREE.map(srcCard).join("")+'<div class="sec-ttl">'+esc(t("secPaid"))+'</div>'+PAID.map(srcCard).join("")+
      '<div class="sec-ttl">·</div>'+
      '<input class="keyin" id="adminKey" type="password" placeholder="'+esc(t("adminKey"))+'" value="'+esc(S.adminKey||"")+'" style="width:100%"/>'+
      '<button class="btn primary" id="saveKeysBtn" style="margin-top:8px">'+esc(t("saveServer"))+'</button>';
    var ak=$("#adminKey");if(ak)ak.addEventListener("input",function(){S.adminKey=this.value;localStorage.setItem("silk_admin_key",this.value);});
    var sb=$("#saveKeysBtn");if(sb)sb.addEventListener("click",saveKeysToServer);
    $$("#settingsBody .keyin").forEach(function(i){i.addEventListener("input",function(){S.keys[this.getAttribute("data-key")]=this.value;localStorage.setItem("silk_keys",JSON.stringify(S.keys));renderSettings();});});
    $$("#settingsBody .switch").forEach(function(b){b.addEventListener("click",function(){var g=this.getAttribute("data-tg");S.toggles[g]=!S.toggles[g];localStorage.setItem("silk_toggles",JSON.stringify(S.toggles));renderSettings();});});
  }

  function applyView(){var dash=S.view==="dashboard";$("#dashboard").classList.toggle("hidden",!dash);$("#settings").classList.toggle("hidden",dash);$("#runBtn").classList.toggle("hidden",!dash);if(!dash)renderSettings();}
  $("#settingsBtn").addEventListener("click",function(){S.view=S.view==="dashboard"?"settings":"dashboard";applyView();});
  $("#themeBtn").addEventListener("click",function(){var cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");var nx=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nx);localStorage.setItem("silk_theme",nx);});
  $$("#langSeg button").forEach(function(b){b.addEventListener("click",function(){S.lang=this.getAttribute("data-lang");localStorage.setItem("silk_lang",S.lang);applyLang();if(S.result)render();else renderReady();if(S.view==="settings")renderSettings();toast(t("langSwitched"));});});
  function toast(m){var el=document.createElement("div");el.className="toast";el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.style.transition="opacity .3s";el.style.opacity="0";setTimeout(function(){el.remove();},300);},1600);}

  (function init(){var th=localStorage.getItem("silk_theme");if(th)document.documentElement.setAttribute("data-theme",th);applyLang();renderReady();})();
})();
</script>
</body>
</html>
