<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>منصة سِلك · ذكاء الأسواق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Silk Enterprise Design System — Carbon × Redwood · bilingual · light+dark */
  :root{
    --bg:#F4F4F4;--surface:#FFFFFF;--surface-2:#F7F7F7;--hover:#E8E8E8;
    --border:#E0E0E0;--border-strong:#C6C6C6;--text:#161616;--text-2:#525252;--text-3:#6F6F6F;
    --primary:#0F62FE;--primary-hover:#0353E9;--primary-active:#002D9C;--primary-soft:#EDF5FF;
    --brand:#C74634;--brand-soft:#FBECE9;
    --success:#198038;--success-soft:#DEFBE6;--warning:#B28600;--warning-soft:#FCF4D6;
    --danger:#DA1E28;--danger-soft:#FFF1F1;--info:#0043CE;--info-soft:#EDF5FF;--focus:#0F62FE;
    --shadow:0 1px 2px rgba(22,22,22,.06),0 8px 24px rgba(22,22,22,.08);
    --shadow-lg:0 2px 6px rgba(22,22,22,.10),0 16px 40px rgba(22,22,22,.14);
    /* سلاسل الرسوم — لوحة فئوية مُتحقَّق منها (CVD ΔE 36.6 · فاتح) · validated categorical series */
    --ch1:#2a78d6;--ch2:#1baf7a;--ch3:#eda100;--ch4:#4a3aa7;--ch5:#e34948;--ch6:#e87ba4;
    --ar:"IBM Plex Sans Arabic",system-ui,Tahoma,sans-serif;--en:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;--ease:cubic-bezier(.2,.6,.3,1);
    --r:6px;--r-lg:10px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#161616;--surface:#262626;--surface-2:#2C2C2C;--hover:#333333;--border:#393939;--border-strong:#525252;
    --text:#F4F4F4;--text-2:#C6C6C6;--text-3:#A8A8A8;--primary:#4589FF;--primary-hover:#78A9FF;--primary-active:#A6C8FF;
    --primary-soft:#1F2A44;--brand:#FF8A75;--brand-soft:#2E1F1B;--success:#42BE65;--success-soft:#1A2E20;
    --warning:#F1C21B;--warning-soft:#332C0E;--danger:#FA4D56;--danger-soft:#341A1C;--info:#4589FF;--info-soft:#1F2A44;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);--shadow-lg:0 2px 8px rgba(0,0,0,.5),0 20px 48px rgba(0,0,0,.6);
    --ch1:#3987e5;--ch2:#199e70;--ch3:#c98500;--ch4:#9085e9;--ch5:#e66767;--ch6:#d55181;
  }}
  :root[data-theme="dark"]{
    --bg:#161616;--surface:#262626;--surface-2:#2C2C2C;--hover:#333333;--border:#393939;--border-strong:#525252;
    --text:#F4F4F4;--text-2:#C6C6C6;--text-3:#A8A8A8;--primary:#4589FF;--primary-hover:#78A9FF;--primary-active:#A6C8FF;
    --primary-soft:#1F2A44;--brand:#FF8A75;--brand-soft:#2E1F1B;--success:#42BE65;--success-soft:#1A2E20;
    --warning:#F1C21B;--warning-soft:#332C0E;--danger:#FA4D56;--danger-soft:#341A1C;--info:#4589FF;--info-soft:#1F2A44;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);--shadow-lg:0 2px 8px rgba(0,0,0,.5),0 20px 48px rgba(0,0,0,.6);
    --ch1:#3987e5;--ch2:#199e70;--ch3:#c98500;--ch4:#9085e9;--ch5:#e66767;--ch6:#d55181;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--ar);font-size:16px;line-height:1.5;
    -webkit-font-smoothing:antialiased;transition:background .3s var(--ease),color .3s var(--ease)}
  html[lang="en"] body{font-family:var(--en)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
  button{font-family:inherit;cursor:pointer;color:inherit}
  a{color:var(--primary);text-decoration:none}
  :focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @keyframes slideup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
  .hidden{display:none!important}
  .shell{max-width:1320px;margin:0 auto;padding-inline:var(--s5)}
  @media(max-width:640px){.shell{padding-inline:var(--s4)}}
  .eyebrow{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--primary)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
  header.appbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
  .appbar-row{display:flex;align-items:center;gap:var(--s4);height:64px}
  .brand{display:flex;align-items:center;gap:var(--s3);min-width:0}
  .logo{width:40px;height:40px;border-radius:8px;background:var(--brand);display:grid;place-items:center;color:#fff;font-weight:700;font-size:20px;flex:none}
  .brand .t{font-size:18px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand .s{font-size:13px;color:var(--text-3)}
  @media(max-width:560px){.appbar-row{gap:var(--s2)}.brand .t{font-size:15px}
    #runBtn span[data-t]{display:none}                 /* U2: زر أيقونة فقط على الجوال */
    #runBtn{padding-inline:12px}.seg button{min-width:auto;padding:8px 11px}
    .iconbtn{width:40px;height:40px}}
  .spacer{flex:1}.actions{display:flex;align-items:center;gap:var(--s3)}
  @media(max-width:720px){.brand .s{display:none}}
  .seg{display:inline-flex;border:1px solid var(--border-strong);border-radius:var(--r);overflow:hidden}
  .seg button{padding:9px 15px;font-size:14px;font-weight:600;background:var(--surface);color:var(--text-2);border:0;transition:.15s var(--ease);min-width:50px}
  .seg button+button{border-inline-start:1px solid var(--border)}.seg button.on{background:var(--primary);color:#fff}
  .seg button:not(.on):hover{background:var(--hover)}
  .iconbtn{display:inline-grid;place-items:center;width:44px;height:44px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r);color:var(--text-2);transition:.15s var(--ease)}
  .iconbtn:hover{background:var(--hover);color:var(--text)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:48px;padding-inline:20px;font-size:15px;font-weight:600;border-radius:var(--r);border:1px solid transparent;transition:.15s var(--ease);white-space:nowrap}
  .btn:disabled{opacity:.5;cursor:default}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:var(--primary-hover)}
  .btn-secondary{background:transparent;color:var(--primary);border-color:var(--primary)}.btn-secondary:hover{background:var(--primary-soft)}
  .btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border-strong)}.btn-ghost:hover{background:var(--hover);color:var(--text)}
  .cmdbar{display:flex;align-items:flex-end;gap:var(--s4);flex-wrap:wrap;padding:var(--s5) 0 var(--s4)}
  .field{display:flex;flex-direction:column;gap:6px;position:relative}
  .field label{font-size:13px;font-weight:600;color:var(--text-2)}
  .control{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r);height:48px;padding-inline:14px;transition:.15s var(--ease)}
  .control:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .control input,.control select{border:0;outline:0;background:transparent;font-family:inherit;font-size:15px;color:var(--text);height:100%;min-width:0;width:100%}
  .field.search{flex:1;min-width:240px}
  .range{display:flex;align-items:center;gap:8px}.range .dash{color:var(--text-3)}
  .hs-chip{font-family:var(--mono);font-size:13px;font-weight:600;background:var(--primary-soft);color:var(--primary);padding:4px 9px;border-radius:5px;direction:ltr;white-space:nowrap}
  .drop{position:absolute;top:calc(100% + 6px);inset-inline:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:40;max-height:320px;overflow-y:auto}
  .drow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
  .drow:last-child{border-bottom:0}.drow:hover{background:var(--hover)}.drow .nm{font-size:15px;font-weight:500}
  .myprod{display:grid;grid-template-columns:1fr;gap:var(--s3);padding:var(--s5);margin-bottom:var(--s5);border-inline-start:4px solid var(--brand)}
  .mp-econ{display:flex;flex-wrap:wrap;gap:var(--s4)}
  .mp-econ .e{display:flex;flex-direction:column;gap:4px}
  .mp-econ .e label{font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .mp-econ .e .control{height:42px;width:140px}
  .mp-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .mp-hint{font-size:13px;color:var(--text-3);line-height:1.5}
  .completeness{display:flex;align-items:center;gap:var(--s4);padding:var(--s4) var(--s5);margin-bottom:var(--s5);flex-wrap:wrap}
  .comp-meter{height:10px;background:var(--surface-2);border-radius:6px;overflow:hidden}
  .comp-meter .fill{display:block;height:100%;border-radius:6px;transition:width .6s var(--ease)}
  .comp-label{font-size:14px;font-weight:600}.comp-pct{font-family:var(--mono);font-size:22px;font-weight:600}
  .section-gap{display:flex;flex-direction:column;gap:var(--s5);padding-bottom:var(--s7)}
  .decision{padding:var(--s6);position:relative;overflow:hidden}
  .decision::before{content:"";position:absolute;inset-block-start:0;inset-inline:0;height:4px;background:var(--success)}
  .decision.no::before{background:var(--danger)}.decision.watch::before{background:var(--warning)}
  .d-head{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s4)}
  .badge{font-size:13px;font-weight:700;padding:6px 14px;border-radius:40px}
  .b-go{background:var(--success-soft);color:var(--success)}.b-no{background:var(--danger-soft);color:var(--danger)}
  .b-watch{background:var(--warning-soft);color:var(--warning)}.b-info{background:var(--info-soft);color:var(--info)}
  .tag{font-size:13px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:5px 12px;border-radius:40px}
  .d-grid{display:grid;grid-template-columns:1fr 200px;gap:var(--s6);align-items:center}
  @media(max-width:760px){.d-grid{grid-template-columns:1fr}}
  .d-verdict{font-size:26px;font-weight:700;line-height:1.3;text-wrap:balance;margin:8px 0 var(--s3)}
  .d-why{font-size:16px;color:var(--text-2);line-height:1.7;max-width:64ch}
  .d-brief{margin:var(--s4) 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
  .d-brief li{font-size:15px;color:var(--text-2);padding-inline-start:22px;position:relative;line-height:1.6}
  .d-brief li::before{content:"";position:absolute;inset-inline-start:0;top:9px;width:8px;height:8px;border-radius:2px;background:var(--primary)}
  .gauge{width:180px;height:180px;border-radius:50%;display:grid;place-items:center;margin-inline:auto;background:conic-gradient(var(--primary) calc(var(--p,0)*1%),var(--border) 0)}
  .gauge .in{width:142px;height:142px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .gauge .n{font-family:var(--mono);font-size:36px;font-weight:600;line-height:1}.gauge .l{font-size:13px;color:var(--text-3);margin-top:4px}
  .d-actions{display:flex;gap:var(--s3);flex-wrap:wrap;margin-top:var(--s5)}
  .pipe{padding:var(--s5) var(--s6)}
  .pipe-head{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s5)}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:7px 14px;border-radius:40px}
  .status.ok{background:var(--success-soft);color:var(--success)}.status.warn{background:var(--warning-soft);color:var(--warning)}
  .status.run{background:var(--primary-soft);color:var(--primary)}.status.idle{background:var(--surface-2);color:var(--text-2)}
  .status .dot{width:8px;height:8px;border-radius:50%;background:currentColor}.run .dot{animation:pulse 1s infinite}
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--s3)}
  @media(max-width:860px){.steps{grid-template-columns:repeat(2,1fr)}}
  .step{padding:var(--s4);border-radius:var(--r-lg);background:var(--surface-2);border:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .step.gap{background:var(--warning-soft);border-color:transparent}
  .step .sn{display:flex;align-items:center;gap:8px}.step .sn b{font-size:15px;font-weight:600}
  .step .num-badge{width:24px;height:24px;border-radius:6px;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;flex:none}
  .step .sd{font-size:13px;color:var(--text-3);line-height:1.45}
  .step .sf{display:flex;align-items:center;gap:7px;font-size:13px;margin-top:2px}.step .sf .dot{width:7px;height:7px;border-radius:50%;flex:none}.step .sf b{font-family:var(--mono)}
  .body-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--s4);align-items:start}
  @media(max-width:960px){.body-grid{grid-template-columns:1fr}}
  /* U2: أبناء الشبكة min-width:0 كي ينكمش الجدول العريض بدل دفع تمرير أفقي للصفحة */
  .body-grid>*,.duo>*{min-width:0}
  table.dt tbody tr:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
  .dt-head{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--s5);border-bottom:1px solid var(--border)}
  .dt-head h3{margin:0;font-size:18px;font-weight:600}.dt-head .cnt{font-size:14px;color:var(--text-3)}
  table.dt{width:100%;border-collapse:collapse}
  table.dt th{font-size:13px;font-weight:600;color:var(--text-2);text-align:start;padding:12px var(--s5);background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
  table.dt td{padding:14px var(--s5);border-bottom:1px solid var(--border);font-size:15px;vertical-align:middle}
  table.dt tbody tr{cursor:pointer;transition:background .12s var(--ease)}
  table.dt tbody tr:hover{background:var(--hover)}table.dt tr.sel{background:var(--primary-soft);box-shadow:inset 3px 0 0 var(--primary)}
  .rk{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--primary)}
  .cty{display:flex;align-items:center;gap:10px}
  .flag{font-family:var(--mono);font-size:12px;background:var(--surface-2);border:1px solid var(--border);padding:3px 7px;border-radius:5px;color:var(--text-2);direction:ltr}
  .cname{font-weight:600}.gap-txt{color:var(--text-3);border-bottom:1px dotted var(--text-3);cursor:help;font-size:14px}
  .bar{display:flex;align-items:center;gap:10px}.bar .bv{font-family:var(--mono);font-weight:600;color:var(--primary);min-width:26px}
  .bar .track{flex:1;min-width:50px;height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden}.bar .fill{display:block;height:100%;background:var(--primary);border-radius:5px}
  .trend{display:flex;align-items:center;gap:8px}
  .growth{font-family:var(--mono);font-size:13px;font-weight:600}.growth.up{color:var(--success)}.growth.down{color:var(--danger)}
  .cov{font-size:13px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 10px;border-radius:40px;white-space:nowrap}.cov.mid{color:var(--warning);background:var(--warning-soft);border-color:transparent}
  .dt-foot{padding:12px var(--s5);font-size:13px;color:var(--text-3);font-family:var(--mono);border-top:1px solid var(--border);direction:ltr;text-align:start}
  .detail{position:sticky;top:80px}.dpad{padding:var(--s5)}
  .d-country{font-size:24px;font-weight:700;margin:0}
  .d-score{display:flex;align-items:baseline;gap:8px;margin:var(--s3) 0}.d-score .n{font-family:var(--mono);font-size:48px;font-weight:600;color:var(--primary);line-height:.9}.d-score .o{font-size:18px;color:var(--text-3)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:var(--s4) 0;overflow-x:auto}
  .tab{padding:12px 14px;font-size:14px;font-weight:600;color:var(--text-2);background:transparent;border:0;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s var(--ease)}
  .tab:hover{color:var(--text)}.tab.on{color:var(--primary);border-bottom-color:var(--primary)}
  .panel-body{animation:slideup .25s var(--ease) both}
  .mypos{background:var(--brand-soft);border-radius:var(--r-lg);padding:var(--s4);margin-bottom:var(--s4)}
  .mypos h4{margin:0 0 6px;font-size:15px;font-weight:700;color:var(--brand)}.mypos .big{font-size:15px;line-height:1.7}.mypos b{font-family:var(--mono)}
  .comp{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
  .comp-h{display:flex;align-items:center;justify-content:space-between;gap:10px}.comp-nm{font-size:15px;font-weight:600}.comp-w{font-size:13px;color:var(--text-3)}
  .comp-v{font-size:20px;font-weight:700;margin-top:4px;font-family:var(--mono)}
  .gapline{display:inline-flex;align-items:center;gap:7px;margin-top:5px;font-size:14px;font-weight:600;color:var(--warning)}.gapline .dot{width:7px;height:7px;border-radius:50%;background:var(--warning)}
  .prov{font-size:13px;color:var(--text-3);font-family:var(--mono);margin-top:6px;direction:ltr;text-align:start;word-break:break-word}
  .ladder{width:100%;border-collapse:collapse;margin-top:6px}
  .ladder th{font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em;text-align:start;padding:8px 10px;border-bottom:1px solid var(--border)}
  .ladder td{padding:11px 10px;border-bottom:1px solid var(--border);font-size:14px}
  .ladder tr.you{background:var(--brand-soft)}.ladder tr.you td{font-weight:700}
  .you-tag{font-size:11px;font-weight:700;color:#fff;background:var(--brand);padding:2px 7px;border-radius:40px;margin-inline-start:6px}
  .pill{font-size:11px;padding:2px 8px;border-radius:40px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2)}
  .subhead{font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:15px}.kv:last-child{border-bottom:0}.kv .kk{color:var(--text-2)}.kv .vv{font-weight:600}
  .supplier{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}.supplier:last-child{border-bottom:0}.supplier .sh{font-family:var(--mono);font-weight:600;color:var(--primary)}
  .list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:12px}
  .list li{font-size:15px;line-height:1.6;padding-inline-start:20px;position:relative}.list li::before{content:"";position:absolute;inset-inline-start:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--primary)}
  .callout{font-size:14px;color:var(--text-2);background:var(--info-soft);border-inline-start:3px solid var(--info);border-radius:var(--r);padding:12px 14px;line-height:1.6;margin-top:var(--s3)}
  .callout.warn{background:var(--warning-soft);border-color:var(--warning)}
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)}@media(max-width:960px){.duo{grid-template-columns:1fr}}
  /* ——— طبقة التحليلات البصرية (الموجة ١٠) · analytics layer — data-only, gaps declared ——— */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s4)}
  @media(max-width:1060px){.kpis{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:1fr}}

    methLead:{ar:"لا نختلق رقماً. كل قيمة تحمل مصدرها وثقتها وتاريخها، وكل فجوة تُعلن بسببها. نُبنى على أفضل المنهجيات العالمية: نموذج مركز التجارة الدولية (ITC) للإمكان التصديري، والتثليث بالمصادر، وشفافية Euromonitor وStatista، ونزاهة Tufte الرسومية.",en:"We never fabricate a number. Every value carries its source, confidence and date; every gap is declared with its reason. Built on the world's leading methodologies: the ITC export-potential model, source triangulation, Euromonitor/Statista transparency, and Tufte's graphical integrity."},

    methTriTitle:{ar:"التثليث بالمرآة",en:"Mirror triangulation"},
    methTriD:{ar:"الإقناع يأتي من التقارب لا من المصدر الواحد. لكل تدفّق رقمان مستقلان في Comtrade: ما تُبلّغه دولة الاستيراد (وارداتها من السعودية) وما تُبلّغه السعودية (صادراتها لتلك الدولة). تطابقهما = ثقة أعلى؛ تباعدهما = علَم تحذير معلَن (إعادة تصدير/توقيت)، لا يُخفى.",en:"Conviction comes from convergence, not a single source. Comtrade holds two independent figures per flow: what the importing country reports (its imports from Saudi Arabia) and what Saudi Arabia reports (its exports to that country). Agreement = higher confidence; divergence = a declared warning flag (re-exports/timing), never hidden."},

  var S={lang:localStorage.getItem("silk_lang")||"ar",product:"",hs:"",selId:null,running:false,raw:null,result:null,sentFlags:{},tab:"position",query:"",

  function t(k){var e=I18N[k];return e?e[S.lang]:k;}
  function base(){return (localStorage.getItem("silk_api")||"").trim().replace(/\/+$/,"");}
  function saveCard(){localStorage.setItem("silk_card",JSON.stringify(S.card));}

  function dpv(c){return c&&typeof c==="object"?c.value:c;}
  function dpList(x){return x==null?[]:(Array.isArray(x)?x:[x]);}
  function realVals(l){return dpList(l).map(function(f){return f&&f.value;}).filter(function(v){return v!=null;});}
  function prov(dp){if(!dp||typeof dp!=="object")return "";var b=[];if(dp.source)b.push(dp.source);if(dp.confidence!=null)b.push((S.lang==="ar"?"ثقة ":"conf ")+dp.confidence);if(dp.retrieved_at)b.push(dp.retrieved_at);return b.join(" · ");}
  function fmtUSD(v){if(v==null)return "—";var n=Number(v);var s=n>=1e9?(n/1e9).toFixed(1)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(0)+"K":n.toLocaleString("en-US");return "$"+s.replace(/\.0([BMK])/,"$1");}

  function spark(series,w,h){
    var vals=(series||[]).map(function(p){return p.value;});
    var obs=vals.filter(function(v){return v!=null;});
    if(obs.length<2)return '<span class="gap-txt">'+esc(t("notObserved"))+'</span>';
    var mn=Math.min.apply(null,obs),mx=Math.max.apply(null,obs),rng=(mx-mn)||1,step=w/(vals.length-1),pts=[];
    for(var i=0;i<vals.length;i++){if(vals[i]==null)continue;var x=i*step,y=h-((vals[i]-mn)/rng)*(h-4)-2;pts.push(x.toFixed(1)+","+y.toFixed(1));}
    var last=obs[obs.length-1],li=vals.lastIndexOf(last),lx=li*step,ly=h-((last-mn)/rng)*(h-4)-2;
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;overflow:visible"><polyline points="'+pts.join(" ")+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="3" fill="var(--primary)"/></svg>';
  }
  function growthTag(g){if(g==null)return '';var up=g>=0;return '<span class="growth '+(up?"up":"down")+'">'+(up?"▲":"▼")+' '+Math.abs(g)+'%</span>';}

  /* ——— محرّك الرسوم (الموجة ١٠) — SVG صرف بلا مكتبات؛ يرسم المرصود فقط ——— */
  var CH=["var(--ch1)","var(--ch2)","var(--ch3)","var(--ch4)","var(--ch5)","var(--ch6)"];
  function niceStep(raw){var p=Math.pow(10,Math.floor(Math.log(raw)/Math.LN10));var n=raw/p;return (n<=1?1:n<=2?2:n<=5?5:10)*p;}
  function chartEmpty(msg){return '<div class="chart-empty"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7" opacity=".55"/></svg><span>'+esc(msg)+'</span></div>';}
  function lineChartSVG(seriesArr,opts){
    opts=opts||{};
    var W=560,H=opts.h||220,PL=48,PR=16,PT=14,PB=28,iw=W-PL-PR,ih=H-PT-PB;
    var ysSet={};seriesArr.forEach(function(s){s.pts.forEach(function(p){ysSet[p.year]=1;});});
    var ys=Object.keys(ysSet).map(Number).sort(function(a,b){return a-b;});
    var mx=0;seriesArr.forEach(function(s){s.pts.forEach(function(p){if(p.value>mx)mx=p.value;});});
    if(ys.length<2||mx<=0)return null;
    var step=niceStep(mx/4),top=Math.ceil(mx/step)*step;
    function X(y){return PL+(ys.indexOf(y)/(ys.length-1))*iw;}
    function Y(v){return PT+ih-(v/top)*ih;}
    var grid="";
    for(var tv=step;tv<=top;tv+=step){grid+='<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+Y(tv).toFixed(1)+'" y2="'+Y(tv).toFixed(1)+'" stroke="var(--border)" stroke-width="1"/><text x="'+(PL-7)+'" y="'+(Y(tv)+3.5).toFixed(1)+'" text-anchor="end" font-size="10" fill="var(--text-3)" font-family="IBM Plex Mono,monospace">'+esc(fmtUSD(tv).replace("$",""))+'</text>';}
    var base='<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+(PT+ih)+'" y2="'+(PT+ih)+'" stroke="var(--border-strong)" stroke-width="1"/>';
    var xl=ys.map(function(y){return '<text x="'+X(y).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="11" fill="var(--text-3)" font-family="IBM Plex Mono,monospace">'+y+'</text>';}).join("");
    var marks=seriesArr.map(function(s,i){
      var col=s.color||CH[i%CH.length];
      var pts=s.pts.slice().sort(function(a,b){return a.year-b.year;});
      var d=pts.map(function(p,j){return (j?"L":"M")+X(p.year).toFixed(1)+","+Y(p.value).toFixed(1);}).join(" ");
      var area=opts.area?'<path d="'+d+' L'+X(pts[pts.length-1].year).toFixed(1)+','+(PT+ih)+' L'+X(pts[0].year).toFixed(1)+','+(PT+ih)+' Z" fill="'+col+'" opacity=".1"/>':"";
      var dots=pts.map(function(p){return '<circle cx="'+X(p.year).toFixed(1)+'" cy="'+Y(p.value).toFixed(1)+'" r="4" fill="'+col+'" stroke="var(--surface)" stroke-width="2"><title>'+esc(s.name)+' '+p.year+': '+esc(fmtUSD(p.value))+'</title></circle>';}).join("");
      return area+'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dots;
    }).join("");
    return '<div class="linewrap"><svg viewBox="0 0 '+W+' '+H+'" role="img">'+grid+base+marks+xl+'</svg></div>';
  }
  function donutSVG(slices){
    var R=50,CIRC=2*Math.PI*R,acc=0,segs="";
    slices.forEach(function(s){
      var len=Math.max(s.pct/100*CIRC-2,0.6);
      segs+='<circle cx="65" cy="65" r="'+R+'" fill="none" stroke="'+s.color+'" stroke-width="20" stroke-dasharray="'+len.toFixed(1)+' '+(CIRC-len).toFixed(1)+'" stroke-dashoffset="'+(-acc/100*CIRC).toFixed(1)+'"><title>'+esc(s.label)+': '+s.pct+'%</title></circle>';
      acc+=s.pct;
    });
    return '<svg width="130" height="130" viewBox="0 0 130 130" role="img"><g transform="rotate(-90 65 65)">'+segs+'</g></svg>';
  }
  function trendSeries(m){
    if(!m||!m.trend||!m.trend.series)return null;
    var pts=m.trend.series.filter(function(p){return p&&p.value!=null;});
    return pts.length>=2?pts:null;
  }

  function postJSON(path,body){
    return fetch(base()+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.text().then(function(tx){var d=null;try{d=JSON.parse(tx);}catch(_){}if(!r.ok){var de=d&&d.detail;throw new Error("HTTP "+r.status+" — "+(de==null?tx:(typeof de==="string"?de:JSON.stringify(de))));}return d;});});

    if(!res||res.classified===false)return {classified:false,product:res&&res.product,note:(res&&(res.hs_note||res.note))||null,view:(res&&res.view)||null};
    var markets=(res.markets||[]).map(function(m,i){
      var c=m.components||{};

        competitors:m.competitors||[],trend:m.trend||null,jury:m.jury||null,ai:(m.jury&&m.jury.ai)||null,
        requirements:dpList(m.requirements).filter(function(r){return r&&r.value;}),

    });

  function pipeHTML(){
    var stCls,stTxt;
    if(S.running){stCls="run";stTxt=t("running");}
    else if(!S.raw){stCls="idle";stTxt=t("idle");}
    else{var top=(S.raw.markets||[])[0],j=top&&top.jury;if(j&&j.agents_with_data>0){stCls="ok";stTxt=t("completeCov")+" "+j.agents_with_data+"/"+j.agents_total+" "+t("agents");}else{stCls="warn";stTxt=t("completeGaps");}}
    var steps=STEPS.map(function(s,i){
      var col="var(--text-3)",cls="",foot=S.raw?"—":"—";
      if(!S.raw){}
      else if(i===0){if(S.raw.hs_code){col="var(--success)";foot="<b class='num'>"+esc(S.raw.hs_code)+"</b> · "+esc(S.raw.hs_confidence);}else{col="var(--warning)";cls="gap";foot=t("declaredGap");}}
      else if(i===4){var top=(S.raw.markets||[])[0],j=top&&top.jury;if(j){col=j.agents_with_data>0?"var(--primary)":"var(--warning)";cls=j.agents_with_data>0?"":"gap";foot=(S.lang==="ar"?"مرحلة ":"stage ")+(j.synthesis_stage||1);}}
      else{var cov=coverage(s[2]);if(cov.n>0){col="var(--success)";foot="<b class='num'>"+cov.n+"/"+cov.total+"</b> "+t("obs");}else{col="var(--warning)";cls="gap";foot=t("declaredGap");}}
      return '<div class="step '+cls+'"><div class="sn"><span class="num-badge">'+(i+1)+'</span><b>'+esc(t(s[0]))+'</b></div><div class="sd">'+esc(t(s[1]))+'</div><div class="sf"><span class="dot" style="background:'+col+'"></span><span>'+foot+'</span></div></div>';
    }).join("");
    return '<section class="card pipe'+(S.running?" run":"")+'"><div class="pipe-head"><div class="eyebrow">'+esc(t("pipeline"))+'</div><span class="status '+stCls+'"><span class="dot"></span>'+esc(stTxt)+'</span></div><div class="steps">'+steps+'</div></section>';

        '<table class="meth-states"><thead><tr><th>'+esc(t("methColState"))+'</th><th>'+esc(t("methColMeaning"))+'</th><th>'+esc(t("methColConf"))+'</th></tr></thead><tbody>'+
        '<tr><td><span class="st obs">'+esc(t("methObs"))+'</span></td><td>'+esc(t("methObsD"))+'</td><td class="num">&gt; 0.6</td></tr>'+
        '<tr><td><span class="st mod">'+esc(t("methMod"))+'</span></td><td>'+esc(t("methModD"))+'</td><td class="num">≤ 0.4</td></tr>'+
        '<tr><td><span class="st gap">'+esc(t("methGapState"))+'</span></td><td>'+esc(t("methGapD"))+'</td><td class="num">0.0</td></tr>'+
        '</tbody></table></section>'+
      '<section class="card"><h2>'+esc(t("methTriTitle"))+'</h2><p style="color:var(--text-2);line-height:1.7;margin:0">'+esc(t("methTriD"))+'</p></section>'+
      '<div class="sec-ttl">'+esc(t("methSourcesTitle"))+'</div><ul class="meth-src">'+
        srcs.map(function(s){return '<li><a href="'+esc(s[1])+'" target="_blank" rel="noopener noreferrer">'+esc(s[0])+'</a></li>';}).join("")+'</ul>';
  }
  function applyView(){var dash=S.view==="dashboard";
    $("#dashboard").classList.toggle("hidden",!dash);
    $("#settings").classList.toggle("hidden",S.view!=="settings");
    $("#methodology").classList.toggle("hidden",S.view!=="methodology");
    $("#runBtn").classList.toggle("hidden",!dash);
    if(S.view==="settings")renderSettings();
    if(S.view==="methodology")renderMethodology();}
  $("#settingsBtn").addEventListener("click",function(){S.view=S.view==="settings"?"dashboard":"settings";applyView();});
  $("#methLink").addEventListener("click",function(){S.view=S.view==="methodology"?"dashboard":"methodology";applyView();});
  $("#themeBtn").addEventListener("click",function(){var cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");var nx=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nx);localStorage.setItem("silk_theme",nx);});
  $$("#langSeg button").forEach(function(b){b.addEventListener("click",function(){S.lang=this.getAttribute("data-lang");localStorage.setItem("silk_lang",S.lang);applyLang();if(S.result)render();else renderReady();if(S.view==="settings")renderSettings();if(S.view==="methodology")renderMethodology();toast(t("langSwitched"));});});
  function toast(m){var el=document.createElement("div");el.className="toast";el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.style.transition="opacity .3s";el.style.opacity="0";setTimeout(function(){el.remove();},300);},1600);}

  (function init(){var th=localStorage.getItem("silk_theme");if(th)document.documentElement.setAttribute("data-theme",th);applyLang();renderReady();})();
})();
</script>
</body>
</html>
