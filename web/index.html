<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>منصة سِلك · ذكاء الأسواق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ═══ سِلك · نظام تصميم مؤسسي (Carbon × Redwood) — إعادة تصميم عالمية v2 ═══
     منهجيات: هرمية بصرية واضحة · كشف تدرّجي · تنقّل جانبي واحد · إسناد لكل رقم.
     كل أسماء الأصناف التي يولّدها JS محفوظة كما هي — التصميم فقط تغيّر. */
  :root{
    --bg:#F2F4F8;--surface:#FFFFFF;--surface-2:#F7F9FC;--surface-3:#EEF2F7;--hover:#E8EDF4;
    --sidebar:#0B1524;--sidebar-2:#111E32;--sidebar-line:#22314A;--sidebar-txt:#AEBACb;--sidebar-txt-2:#7C8BA3;
    --border:#E1E7EF;--border-strong:#C4CDDA;--text:#0B1524;--text-2:#48566B;--text-3:#6B7A90;
    --primary:#0F62FE;--primary-hover:#0353E9;--primary-active:#002D9C;--primary-soft:#E8F0FE;--primary-line:#B9D2FF;
    --brand:#C74634;--brand-2:#E06A56;--brand-soft:#FBECE9;
    --success:#15823B;--success-soft:#E3F5E9;--warning:#9A6B00;--warning-soft:#FBF0D6;
    --danger:#D02233;--danger-soft:#FDECEE;--info:#0043CE;--info-soft:#E8F0FE;--focus:#0F62FE;
    --shadow-sm:0 1px 2px rgba(11,21,36,.06);
    --shadow:0 1px 3px rgba(11,21,36,.07),0 8px 24px -8px rgba(11,21,36,.12);
    --shadow-lg:0 4px 12px rgba(11,21,36,.10),0 24px 48px -12px rgba(11,21,36,.22);
    --ar:"IBM Plex Sans Arabic",system-ui,Tahoma,sans-serif;--en:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;--ease:cubic-bezier(.22,.61,.36,1);
    --r:8px;--r-lg:14px;--r-xl:20px;--s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;--s8:64px;
    --nav-w:248px;--head-h:64px;
    --ch1:#0F62FE;--ch2:#15823B;--ch3:#C74634;--ch4:#7C3AED;--ch5:#0E9AA8;--ch6:#B8860B;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#0A0F18;--surface:#111927;--surface-2:#0E1622;--surface-3:#182234;--hover:#1E293B;
    --sidebar:#070B12;--sidebar-2:#0D1420;--sidebar-line:#1C2942;--sidebar-txt:#9FB0C9;--sidebar-txt-2:#63748f;
    --border:#22303F;--border-strong:#33455A;--text:#EAF0F8;--text-2:#A8B6CA;--text-3:#78899F;
    --primary:#4589FF;--primary-hover:#78A9FF;--primary-active:#A6C8FF;--primary-soft:#152238;--primary-line:#2A4570;
    --brand:#FF8A75;--brand-2:#FFA791;--brand-soft:#2A1B17;--success:#3FBF6A;--success-soft:#14271B;
    --warning:#E5A93B;--warning-soft:#2A2210;--danger:#FF5C6B;--danger-soft:#2B1518;--info:#4589FF;--info-soft:#152238;
    --shadow-sm:0 1px 2px rgba(0,0,0,.5);--shadow:0 2px 8px rgba(0,0,0,.45),0 16px 40px -12px rgba(0,0,0,.6);
    --shadow-lg:0 8px 24px rgba(0,0,0,.5),0 32px 64px -16px rgba(0,0,0,.7);
    --ch1:#4589FF;--ch2:#3FBF6A;--ch3:#FF8A75;--ch4:#A78BFA;--ch5:#22C3D6;--ch6:#E5B84B;
  }}
  :root[data-theme="dark"]{
    --bg:#0A0F18;--surface:#111927;--surface-2:#0E1622;--surface-3:#182234;--hover:#1E293B;
    --sidebar:#070B12;--sidebar-2:#0D1420;--sidebar-line:#1C2942;--sidebar-txt:#9FB0C9;--sidebar-txt-2:#63748f;
    --border:#22303F;--border-strong:#33455A;--text:#EAF0F8;--text-2:#A8B6CA;--text-3:#78899F;
    --primary:#4589FF;--primary-hover:#78A9FF;--primary-active:#A6C8FF;--primary-soft:#152238;--primary-line:#2A4570;
    --brand:#FF8A75;--brand-2:#FFA791;--brand-soft:#2A1B17;--success:#3FBF6A;--success-soft:#14271B;
    --warning:#E5A93B;--warning-soft:#2A2210;--danger:#FF5C6B;--danger-soft:#2B1518;--info:#4589FF;--info-soft:#152238;
    --shadow-sm:0 1px 2px rgba(0,0,0,.5);--shadow:0 2px 8px rgba(0,0,0,.45),0 16px 40px -12px rgba(0,0,0,.6);
    --shadow-lg:0 8px 24px rgba(0,0,0,.5),0 32px 64px -16px rgba(0,0,0,.7);
    --ch1:#4589FF;--ch2:#3FBF6A;--ch3:#FF8A75;--ch4:#A78BFA;--ch5:#22C3D6;--ch6:#E5B84B;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--ar);font-size:15px;line-height:1.55;
    -webkit-font-smoothing:antialiased;transition:background .3s var(--ease),color .3s var(--ease)}
  html[lang="en"] body{font-family:var(--en)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
  button{font-family:inherit;cursor:pointer;color:inherit}
  a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
  h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-.01em}
  :focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .eyebrow{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--primary)}

  /* ─── التخطيط: شريط جانبي + مساحة عمل ─── */
  .layout{display:grid;grid-template-columns:var(--nav-w) 1fr;min-height:100vh}
  .sidebar{background:var(--sidebar);color:var(--sidebar-txt);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
    border-inline-end:1px solid var(--sidebar-line);z-index:40}
  .sb-brand{display:flex;align-items:center;gap:12px;padding:20px var(--s5);border-bottom:1px solid var(--sidebar-line)}
  .sb-brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:19px;flex:none;box-shadow:0 4px 12px -2px rgba(199,70,52,.5)}
  .sb-brand .t{font-size:15px;font-weight:600;color:#fff;line-height:1.25}
  .sb-brand .s{font-size:11.5px;color:var(--sidebar-txt-2);margin-top:1px}
  .sb-nav{padding:var(--s4) var(--s3);display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
  .sb-nav button{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:0;background:transparent;
    color:var(--sidebar-txt);font-size:14.5px;font-weight:500;border-radius:10px;text-align:start;transition:.15s var(--ease);position:relative}
  .sb-nav button .sn-n{width:24px;height:24px;border-radius:7px;background:var(--sidebar-2);border:1px solid var(--sidebar-line);
    display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--sidebar-txt-2);flex:none;transition:.15s var(--ease)}
  .sb-nav button:hover{background:var(--sidebar-2);color:#fff}
  .sb-nav button.on{background:linear-gradient(90deg,rgba(15,98,254,.16),transparent);color:#fff}
  .sb-nav button.on::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--primary)}
  .sb-nav button.on .sn-n{background:var(--primary);border-color:var(--primary);color:#fff}
  .sb-foot{padding:var(--s4) var(--s5);border-top:1px solid var(--sidebar-line);font-size:11px;color:var(--sidebar-txt-2);line-height:1.6}
  .workspace{min-width:0;display:flex;flex-direction:column}

  /* ─── الشريط العلوي ─── */
  .topbar{position:sticky;top:0;z-index:30;height:var(--head-h);background:color-mix(in srgb,var(--surface) 88%,transparent);
    backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--s4);padding:0 var(--s6)}
  .tb-title{font-size:17px;font-weight:600}.tb-title .sub{font-size:12.5px;color:var(--text-3);font-weight:400}
  .spacer{flex:1}.actions{display:flex;align-items:center;gap:var(--s3)}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
  .seg button{padding:6px 13px;font-size:13px;font-weight:600;background:transparent;color:var(--text-2);border:0;border-radius:6px;transition:.15s var(--ease)}
  .seg button.on{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-sm)}
  .seg button:not(.on):hover{color:var(--text)}
  .iconbtn{display:inline-grid;place-items:center;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-2);transition:.15s var(--ease)}
  .iconbtn:hover{background:var(--hover);color:var(--text)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;padding-inline:20px;font-size:14.5px;font-weight:600;border-radius:10px;border:1px solid transparent;transition:.15s var(--ease);white-space:nowrap}
  .btn:disabled{opacity:.5;cursor:default}
  .btn-primary,.btn.primary{background:var(--primary);color:#fff;box-shadow:0 6px 16px -6px rgba(15,98,254,.6)}
  .btn-primary:hover:not(:disabled),.btn.primary:hover{background:var(--primary-hover)}
  .btn-secondary{background:transparent;color:var(--primary);border-color:var(--primary-line)}.btn-secondary:hover{background:var(--primary-soft)}
  .btn-ghost{background:var(--surface);color:var(--text-2);border-color:var(--border)}.btn-ghost:hover{background:var(--hover);color:var(--text)}

  /* ─── حاوية المحتوى ─── */
  .content{max-width:1240px;width:100%;margin:0 auto;padding:var(--s6)}
  @media(max-width:640px){.content{padding:var(--s4)}}
  .scr-head{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--s4);flex-wrap:wrap;margin-bottom:var(--s5)}
  .scr-title{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .section-gap{display:flex;flex-direction:column;gap:var(--s5);padding-bottom:var(--s7)}

  /* ─── البطاقات ─── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
  .panel{padding:var(--s5)}.panel>h3{font-size:16px;margin-bottom:var(--s2)}.panel .sub{font-size:13.5px;color:var(--text-2);margin-bottom:var(--s4);line-height:1.6}
  .subhead{font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin:var(--s5) 0 var(--s3)}
  .pipe-head{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s4)}
  .pipe-head h3{font-size:16px}

  /* ─── شريط الأوامر (تحليل جديد) ─── */
  .cmdbar{display:flex;align-items:flex-end;gap:var(--s4);flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r-lg);box-shadow:var(--shadow);padding:var(--s5);margin-bottom:var(--s5)}
  .field{display:flex;flex-direction:column;gap:7px;position:relative}
  .field label{font-size:12.5px;font-weight:600;color:var(--text-2)}
  .control{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:10px;height:46px;padding-inline:14px;transition:.15s var(--ease)}
  .control:focus-within{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft)}
  .control input,.control select{border:0;outline:0;background:transparent;font-family:inherit;font-size:14.5px;color:var(--text);height:100%;min-width:0;width:100%}
  .field.search{flex:1;min-width:240px}.mkt-field{min-width:240px;flex:1}
  .range{display:flex;align-items:center;gap:8px}.range .dash{color:var(--text-3)}
  .hs-chip{font-family:var(--mono);font-size:12px;font-weight:600;background:var(--primary-soft);color:var(--primary);padding:4px 9px;border-radius:6px;direction:ltr;white-space:nowrap;border:1px solid var(--primary-line)}
  .drop{position:absolute;top:calc(100% + 6px);inset-inline:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:40;max-height:320px;overflow-y:auto;padding:6px}
  .drow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;cursor:pointer;border-radius:8px}
  .drow:hover{background:var(--hover)}.drow .nm{font-size:14.5px;font-weight:500}
  .mkt-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .mkt-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;background:var(--primary-soft);color:var(--primary);border:1px solid var(--primary-line);padding:4px 6px 4px 11px;border-radius:40px}
  .mkt-chip button{border:0;background:transparent;color:var(--primary);font-size:15px;line-height:1;padding:0 2px}
  .mkt-hint{font-size:12px;color:var(--text-3);margin-top:6px;line-height:1.5}
  .myprod{padding:var(--s5);margin-bottom:var(--s5);border-inline-start:4px solid var(--brand);border-radius:var(--r-lg)}
  .mp-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:var(--s4)}
  .mp-econ{display:flex;flex-wrap:wrap;gap:var(--s4)}
  .mp-econ .e{display:flex;flex-direction:column;gap:5px}
  .mp-econ .e label{font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .mp-econ .e .control{height:42px;width:150px}
  .mp-hint{font-size:12.5px;color:var(--text-3);line-height:1.5;margin-top:var(--s4)}

  /* ─── مقياس الاكتمال ─── */
  .completeness{display:flex;align-items:center;gap:var(--s4);padding:var(--s4) var(--s5);margin-bottom:var(--s5);flex-wrap:wrap;border-radius:var(--r-lg)}
  .comp-meter{height:8px;background:var(--surface-3);border-radius:6px;overflow:hidden}
  .comp-meter .fill{display:block;height:100%;border-radius:6px;transition:width .6s var(--ease)}
  .comp-label{font-size:13.5px;font-weight:600}.comp-pct{font-family:var(--mono);font-size:26px;font-weight:600}

  /* ─── خط الأنابيب ─── */
  .pipe{padding:var(--s5) var(--s6)}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:6px 13px;border-radius:40px}
  .status.ok{background:var(--success-soft);color:var(--success)}.status.warn{background:var(--warning-soft);color:var(--warning)}
  .status.run{background:var(--primary-soft);color:var(--primary)}.status.idle{background:var(--surface-3);color:var(--text-2)}
  .status .dot{width:7px;height:7px;border-radius:50%;background:currentColor}.run .dot{animation:pulse 1s infinite}
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--s3)}
  @media(max-width:860px){.steps{grid-template-columns:repeat(2,1fr)}}
  .step{padding:var(--s4);border-radius:12px;background:var(--surface-2);border:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .step.gap{background:var(--warning-soft);border-color:transparent}
  .step .sn{display:flex;align-items:center;gap:8px}.step .sn b{font-size:14px;font-weight:600}
  .step .num-badge{width:22px;height:22px;border-radius:7px;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  .step .sd{font-size:12px;color:var(--text-3);line-height:1.45}
  .step .sf{display:flex;align-items:center;gap:7px;font-size:12.5px;margin-top:2px}.step .sf .dot{width:7px;height:7px;border-radius:50%;flex:none}.step .sf b{font-family:var(--mono)}

  /* ─── بطاقة القرار (hero) ─── */
  .decision{padding:var(--s6);position:relative;overflow:hidden;border-radius:var(--r-xl);box-shadow:var(--shadow)}
  .decision::before{content:"";position:absolute;inset-block-start:0;inset-inline:0;height:5px;background:var(--success)}
  .decision.no::before{background:var(--danger)}.decision.watch::before{background:var(--warning)}
  .d-head{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s5)}
  .badge{font-size:12.5px;font-weight:700;padding:6px 15px;border-radius:40px;letter-spacing:.01em}
  .b-go{background:var(--success-soft);color:var(--success)}.b-no{background:var(--danger-soft);color:var(--danger)}
  .b-watch{background:var(--warning-soft);color:var(--warning)}.b-info{background:var(--info-soft);color:var(--info)}
  .tag{font-size:12.5px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:5px 12px;border-radius:40px}
  .d-grid{display:grid;grid-template-columns:1fr 210px;gap:var(--s6);align-items:center}
  @media(max-width:760px){.d-grid{grid-template-columns:1fr}}
  .d-verdict{font-size:28px;font-weight:700;line-height:1.25;text-wrap:balance;margin:8px 0 var(--s3);letter-spacing:-.02em}
  .d-why{font-size:15.5px;color:var(--text-2);line-height:1.75;max-width:64ch}
  .d-brief{margin:var(--s4) 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
  .d-brief li{font-size:14.5px;color:var(--text-2);padding-inline-start:22px;position:relative;line-height:1.6}
  .d-brief li::before{content:"";position:absolute;inset-inline-start:0;top:8px;width:8px;height:8px;border-radius:3px;background:var(--primary)}
  .gauge{width:190px;height:190px;border-radius:50%;display:grid;place-items:center;margin-inline:auto;background:conic-gradient(var(--primary) calc(var(--p,0)*1%),var(--surface-3) 0)}
  .gauge .in{width:150px;height:150px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center;box-shadow:inset 0 0 0 1px var(--border)}
  .gauge .n{font-family:var(--mono);font-size:38px;font-weight:600;line-height:1}.gauge .l{font-size:12.5px;color:var(--text-3);margin-top:4px}
  .d-actions{display:flex;gap:var(--s3);flex-wrap:wrap;margin-top:var(--s5)}
  .score-big{font-family:var(--mono);font-size:52px;font-weight:600;color:var(--primary);line-height:1}

  /* ─── جدول الأسواق ─── */
  .dt-head{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--s5);border-bottom:1px solid var(--border)}
  .dt-head h3{font-size:16px}.dt-head .cnt{font-size:13px;color:var(--text-3)}
  table.dt{width:100%;border-collapse:collapse}
  table.dt th{font-size:12px;font-weight:600;color:var(--text-3);text-align:start;padding:11px var(--s5);background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
  table.dt td{padding:13px var(--s5);border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
  table.dt tbody tr{cursor:pointer;transition:background .12s var(--ease)}
  table.dt tbody tr:hover{background:var(--hover)}table.dt tr.sel{background:var(--primary-soft);box-shadow:inset 3px 0 0 var(--primary)}
  table.dt tbody tr:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
  .rk{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--primary)}
  .cty{display:flex;align-items:center;gap:10px}
  .flag{font-family:var(--mono);font-size:11px;background:var(--surface-3);border:1px solid var(--border);padding:3px 7px;border-radius:6px;color:var(--text-2);direction:ltr}
  .cname{font-weight:600}.gap-txt{color:var(--text-3);border-bottom:1px dotted var(--text-3);cursor:help;font-size:13px}
  .bar{display:flex;align-items:center;gap:10px}.bar .bv{font-family:var(--mono);font-weight:600;color:var(--primary);min-width:26px}
  .bar .track{flex:1;min-width:48px;height:7px;background:var(--surface-3);border-radius:5px;overflow:hidden}.bar .fill{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--ch5));border-radius:5px}
  .trend{display:flex;align-items:center;gap:8px}
  .growth{font-family:var(--mono);font-size:12.5px;font-weight:600}.growth.up{color:var(--success)}.growth.down{color:var(--danger)}
  .cov{font-size:12.5px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 10px;border-radius:40px;white-space:nowrap}.cov.mid{color:var(--warning);background:var(--warning-soft);border-color:transparent}
  .dt-foot{padding:11px var(--s5);font-size:12px;color:var(--text-3);font-family:var(--mono);border-top:1px solid var(--border);direction:ltr;text-align:start}
  .body-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--s4);align-items:start}
  @media(max-width:960px){.body-grid{grid-template-columns:1fr}}
  .body-grid>*,.duo>*{min-width:0}

  /* ─── لوحة التفاصيل ─── */
  .detail{position:sticky;top:calc(var(--head-h) + var(--s4))}.dpad{padding:var(--s5)}
  .d-country{font-size:22px;font-weight:700}
  .d-score{display:flex;align-items:baseline;gap:8px;margin:var(--s3) 0}.d-score .n{font-family:var(--mono);font-size:46px;font-weight:600;color:var(--primary);line-height:.9}.d-score .o{font-size:17px;color:var(--text-3)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:var(--s4) 0;overflow-x:auto}
  .tab{padding:11px 13px;font-size:13.5px;font-weight:600;color:var(--text-2);background:transparent;border:0;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s var(--ease)}
  .tab:hover{color:var(--text)}.tab.on{color:var(--primary);border-bottom-color:var(--primary)}
  .panel-body{animation:slideup .25s var(--ease) both}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14.5px}.kv:last-child{border-bottom:0}.kv .kk{color:var(--text-2)}.kv .vv{font-weight:600}
  .mypos{background:var(--brand-soft);border-radius:12px;padding:var(--s4);margin-bottom:var(--s4)}
  .mypos h4{font-size:14.5px;font-weight:700;color:var(--brand);margin-bottom:6px}.mypos .big{font-size:14.5px;line-height:1.7}
  .supplier{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13.5px}.supplier:last-child{border-bottom:0}.supplier .sh{font-family:var(--mono);font-weight:600;color:var(--primary);white-space:nowrap}

  /* ─── بطاقات المقاييس (شبكة) ─── */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:var(--s4)}
  .mcard{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:var(--s4)}
  .mcard .mc-l{font-size:12.5px;font-weight:600;color:var(--text-2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .mcard .mc-v{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:8px;line-height:1.1;color:var(--text)}
  .mcard .mc-f{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:6px;direction:ltr;text-align:start;word-break:break-word}
  .modeled{font-size:10.5px;font-weight:600;color:var(--warning);background:var(--warning-soft);padding:2px 7px;border-radius:40px}
  .prov{font-size:11.5px;color:var(--text-3);font-family:var(--mono);margin-top:6px;direction:ltr;text-align:start;word-break:break-word;line-height:1.5}

  /* ─── الأعمدة الأربعة ─── */
  .pillar{margin-bottom:var(--s4)}
  .pillar .ph{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .pillar .ph .num{color:var(--primary)}
  .pillar .track{height:9px;background:var(--surface-3);border-radius:5px;overflow:hidden}
  .pillar .track .fill{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--ch5));border-radius:5px;transition:width .5s var(--ease)}

  /* ─── الجداول العامة (سلالم/قوائم) ─── */
  .ladder{width:100%;border-collapse:collapse;margin-top:6px}
  .ladder th{font-size:11.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em;text-align:start;padding:9px 11px;border-bottom:1px solid var(--border-strong);white-space:nowrap}
  .ladder td{padding:11px 11px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:top}
  .ladder tr.you{background:var(--brand-soft)}.ladder tr.you td{font-weight:700}
  .you-tag{font-size:10.5px;font-weight:700;color:#fff;background:var(--brand);padding:2px 7px;border-radius:40px;margin-inline-start:6px}
  .pill{font-size:10.5px;padding:2px 8px;border-radius:40px;background:var(--surface-3);border:1px solid var(--border);color:var(--text-2);white-space:nowrap}
  .unverified{font-size:10.5px;padding:2px 8px;border-radius:40px;background:var(--warning-soft);color:var(--warning)}
  .comp{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
  .comp-h{display:flex;align-items:center;justify-content:space-between;gap:10px}.comp-nm{font-size:14px;font-weight:600}.comp-w{font-size:12.5px;color:var(--text-3)}
  .comp-v{font-size:20px;font-weight:700;margin-top:4px;font-family:var(--mono)}
  .gapline{display:inline-flex;align-items:center;gap:7px;margin-top:5px;font-size:13px;font-weight:600;color:var(--warning)}.gapline .dot{width:7px;height:7px;border-radius:50%;background:var(--warning);flex:none}
  .list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px}
  .list li{font-size:14px;line-height:1.6;padding-inline-start:20px;position:relative}.list li::before{content:"";position:absolute;inset-inline-start:0;top:8px;width:7px;height:7px;border-radius:50%;background:var(--primary)}
  .limits{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px}.limits li{font-size:14px;line-height:1.6;padding-inline-start:22px;position:relative}.limits li::before{content:"—";position:absolute;inset-inline-start:0;color:var(--warning);font-weight:700}
  .callout{font-size:13.5px;color:var(--text-2);background:var(--info-soft);border-inline-start:3px solid var(--info);border-radius:10px;padding:12px 14px;line-height:1.6;margin-top:var(--s3)}
  .callout.warn{background:var(--warning-soft);border-color:var(--warning)}
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)}@media(max-width:960px){.duo{grid-template-columns:1fr}}

  /* ─── SWOT ─── */
  .swotgrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)}@media(max-width:640px){.swotgrid{grid-template-columns:1fr}}
  .swotcell{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:var(--s4)}
  .swotcell h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px;color:var(--text-2)}

  /* ─── حالات فارغة/جاهزة ─── */
  .ready{padding:var(--s8) var(--s5);text-align:center;max-width:600px;margin:0 auto;border-radius:var(--r-lg)}
  .ready h2{font-size:23px;margin-bottom:10px}.ready p{color:var(--text-2);margin-bottom:var(--s4);font-size:15px;line-height:1.6}
  .ready .foot{font-size:13px;color:var(--text-3);margin-top:var(--s4);line-height:1.6}
  .err{color:var(--danger);background:var(--danger-soft);border-radius:10px;padding:16px;font-size:14.5px}
  .skl{height:16px;background:linear-gradient(90deg,var(--surface-2),var(--hover),var(--surface-2));background-size:200% 100%;border-radius:6px;animation:pulse 1.2s infinite}

  /* ─── الإعدادات ─── */
  .settings{max-width:860px;margin:0 auto}
  .sec-ttl{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--primary);margin:var(--s5) 0 var(--s3)}
  .srccard{display:flex;align-items:center;gap:var(--s4);padding:var(--s4);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--surface);box-shadow:var(--shadow-sm)}
  .srccard .body{flex:1;min-width:0}.srccard .nm{font-size:15px;font-weight:600}.srccard .ds{font-size:13px;color:var(--text-2)}
  .stbadge{font-size:11.5px;padding:4px 11px;border-radius:40px;white-space:nowrap}.st-on{background:var(--success-soft);color:var(--success)}.st-off{background:var(--surface-3);color:var(--text-2)}
  .keyin{font-family:var(--mono);font-size:13px;border:1px solid var(--border-strong);border-radius:9px;padding:10px 12px;width:220px;max-width:44vw;outline:0;background:var(--surface-2);color:var(--text)}.keyin:focus{border-color:var(--primary);background:var(--surface)}
  .switch{width:44px;height:25px;border-radius:40px;background:var(--border-strong);position:relative;border:0;transition:.2s var(--ease);flex:none}.switch.on{background:var(--primary)}.switch .k{position:absolute;top:3px;inset-inline-start:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s var(--ease)}.switch.on .k{inset-inline-start:22px}

  .toast{position:fixed;inset-block-end:24px;inset-inline-end:24px;background:var(--sidebar);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);z-index:100;animation:slideup .25s var(--ease);max-width:90vw}
  footer{border-top:1px solid var(--border);padding:var(--s4) var(--s6);color:var(--text-3);font-size:12.5px}

  /* ─── مركز القيادة البصري: KPI + رسوم ─── */
  .sb-foot{display:flex;align-items:center;gap:8px}.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 0 3px rgba(63,191,106,.18);flex:none}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s4)}
  @media(max-width:1060px){.kpis{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.kpis{grid-template-columns:1fr}}
  .kpis>*,.charts>*{min-width:0}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s5);display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .kpi .kl{font-size:12.5px;font-weight:600;color:var(--text-2);line-height:1.4}
  .kpi .kvv{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1.05;direction:ltr;unicode-bidi:plaintext;text-align:start;color:var(--text)}
  .kpi .kvv .u{font-size:15px;color:var(--text-3);font-weight:500}
  .kpi .kvv.gap{font-family:var(--ar);font-size:15px;color:var(--warning);direction:inherit}
  .kpi .kfoot{font-size:11px;color:var(--text-3);font-family:var(--mono);direction:ltr;text-align:start;min-height:14px;word-break:break-word;line-height:1.5}
  .kpi-accent{background:linear-gradient(160deg,var(--primary-soft),var(--surface) 60%);border-color:var(--primary-line)}
  .kpi-accent::after{content:"";position:absolute;inset-block-start:0;inset-inline:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--ch5))}
  .kpi-accent .kvv{color:var(--primary)}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4);align-items:start}
  @media(max-width:960px){.charts{grid-template-columns:1fr}}
  .chart-empty{border:1.5px dashed var(--border-strong);border-radius:12px;padding:var(--s6);text-align:center;color:var(--text-3);font-size:13.5px;background:var(--surface-2);margin-top:8px}
  .hbars{display:flex;flex-direction:column;gap:2px;margin-top:8px}
  .hbar-row{display:grid;grid-template-columns:minmax(80px,120px) 1fr 40px;align-items:center;gap:12px;padding:8px;border-radius:8px;cursor:pointer;transition:background .12s var(--ease)}
  .hbar-row:hover{background:var(--hover)}.hbar-row.sel{background:var(--primary-soft)}
  .hbar-row .lbl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar-row .track{height:20px;background:var(--surface-3);border-radius:6px;overflow:hidden}
  .hbar-row .hfill{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--ch5));border-radius:6px;transition:width .5s var(--ease)}
  .hbar-row .val{font-size:13px;font-weight:700;text-align:end;color:var(--primary)}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin:4px 0 10px}
  .lg{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--text-2)}
  .lg .sw,.dlegend .sw{width:12px;height:12px;border-radius:4px;flex:none}
  .linewrap{direction:ltr}.linewrap svg{display:block;width:100%;height:auto}
  .donutwrap{display:flex;align-items:center;gap:var(--s5);flex-wrap:wrap;margin-top:8px}
  .donutwrap svg{flex:none}
  .dlegend{display:flex;flex-direction:column;gap:9px;min-width:150px;flex:1}
  .dlegend .drow2{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px}
  .dlegend .nm{display:inline-flex;align-items:center;gap:8px;font-weight:600;min-width:0}
  .dlegend .nm span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ─── الاستجابة: طيّ الشريط الجانبي ─── */
  @media(max-width:900px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:sticky;top:0;height:auto;flex-direction:row;align-items:center;border-inline-end:0;border-bottom:1px solid var(--sidebar-line);overflow-x:auto}
    .sb-brand{border-bottom:0;border-inline-end:1px solid var(--sidebar-line);padding:12px var(--s4);flex:none}
    .sb-brand .s{display:none}
    .sb-nav{flex-direction:row;padding:8px var(--s3);gap:4px;flex:1}
    .sb-nav button{white-space:nowrap;padding:9px 12px}.sb-nav button.on::before{inset:auto 8px 0 8px;width:auto;height:3px;top:auto}
    .sb-nav button span:not(.sn-n){display:none}
    .sb-foot{display:none}
    .topbar{padding:0 var(--s4)}.tb-title .sub{display:none}
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-brand"><div class="logo">S</div><div><div class="t" data-t="appName"></div><div class="s" data-t="appTag"></div></div></div>
    <nav class="sb-nav" id="scrnav">
      <button data-scr="1" class="on"><span class="sn-n">1</span><span data-t="nav1"></span></button>
      <button data-scr="2"><span class="sn-n">2</span><span data-t="nav2"></span></button>
      <button data-scr="3"><span class="sn-n">3</span><span data-t="nav3"></span></button>
      <button data-scr="4"><span class="sn-n">4</span><span data-t="nav4"></span></button>
      <button data-scr="5"><span class="sn-n">5</span><span data-t="nav5"></span></button>
      <button data-scr="6"><span class="sn-n">6</span><span data-t="nav6"></span></button>
      <button data-scr="7"><span class="sn-n">7</span><span data-t="nav7"></span></button>
      <button data-scr="8"><span class="sn-n">8</span><span data-t="nav8"></span></button>
    </nav>
    <div class="sb-foot"><span class="sb-dot"></span><span data-t="footBadge"></span></div>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="tb-title" data-t="appName"></div>
      <div class="spacer"></div>
      <div class="actions">
        <div class="seg" id="langSeg" role="group" aria-label="Language"><button data-lang="ar" class="on">العربية</button><button data-lang="en">EN</button></div>
        <button class="iconbtn" id="settingsBtn" aria-label="Settings"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-1.8-.3 1.6 1.6 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.6 1.6 0 00-1-1.5 1.6 1.6 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.6 1.6 0 00.3-1.8 1.6 1.6 0 00-1.5-1H3a2 2 0 110-4h.1a1.6 1.6 0 001.5-1 1.6 1.6 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.6 1.6 0 001.8.3H9a1.6 1.6 0 001-1.5V3a2 2 0 114 0v.1a1.6 1.6 0 001 1.5 1.6 1.6 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-.3 1.8V9a1.6 1.6 0 001.5 1H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z"/></svg></button>
        <button class="iconbtn" id="themeBtn" aria-label="Theme"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg></button>
        <button class="btn btn-primary" id="runBtn" disabled><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9z"/></svg><span data-t="analyze"></span></button>
      </div>
    </header>

    <main id="dashboard" class="content">
      <div class="scr-head"><h1 class="scr-title" data-t="nav1"></h1></div>
      <div class="cmdbar">
        <div class="field search">
          <label data-t="searchLabel"></label>
          <div class="control"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input id="search" autocomplete="off" /><span class="hs-chip hidden" id="hschip"></span></div>
          <div class="drop hidden" id="drop"></div>
        </div>
        <div class="field"><label data-t="studyYears"></label><div class="control range"><select id="yFrom"></select><span class="dash">—</span><select id="yTo"></select></div></div>
        <div class="field search mkt-field">
          <label data-t="targetMarkets"></label>
          <div class="control"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round"><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg><input id="mktSearch" autocomplete="off" /></div>
          <div class="drop hidden" id="mktDrop"></div>
          <div id="mktChips" class="mkt-chips"></div>
          <div class="mkt-hint" data-t="targetMarketsHint"></div>
        </div>
      </div>

          <div class="e"><label data-t="cost"></label><div class="control"><input id="mpCost" type="number" min="0" step="0.01" class="num"/></div></div>
          <div class="e"><label data-t="myPrice"></label><div class="control"><input id="mpPrice" type="number" min="0" step="0.01" class="num"/></div></div>

          <div class="e"><label data-t="tier"></label><div class="control"><select id="mpTier"></select></div></div>
          <div class="e"><label data-t="capacity"></label><div class="control"><input id="mpCap" type="number" min="0" step="1" class="num"/></div></div>
        </div>
        <div class="mp-hint" data-t="mpHint"></div>
      </section>

      <div class="card completeness hidden" id="completeness"></div>
      <div id="resultArea"></div>
    </main>

    <main id="screens" class="content hidden"><div id="screenBody" style="padding-bottom:var(--s7)"></div></main>

    <main id="settings" class="content hidden"><div class="settings"><h1 class="scr-title" data-t="settingsTitle"></h1><div class="sub" data-t="settingsSub" style="color:var(--text-2);margin:8px 0 var(--s4)"></div><div id="settingsBody"></div><div id="dataPanels"></div></div></main>
  </div>
</div>

<script>
(function(){

  function iso2(i){return ISO2[i]||(i||"").slice(0,2);}

  function dpv(c){return c&&typeof c==="object"?c.value:c;}
  function dpList(x){return x==null?[]:(Array.isArray(x)?x:[x]);}
  function realVals(l){return dpList(l).map(function(f){return f&&f.value;}).filter(function(v){return v!=null;});}
  function prov(dp){if(!dp||typeof dp!=="object")return "";var b=[];if(dp.source)b.push(dp.source);if(dp.confidence!=null)b.push((S.lang==="ar"?"ثقة ":"conf ")+dp.confidence);if(dp.retrieved_at)b.push(dp.retrieved_at);return b.join(" · ");}
  function fmtUSD(v){if(v==null)return "—";var n=Number(v);if(n>=1e9)return "$"+(n/1e9).toFixed(1)+"B";if(n>=1e6)return "$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return "$"+(n/1e3).toFixed(0)+"K";return "$"+n.toLocaleString("en-US");}

  function spark(series,w,h){
    var vals=(series||[]).map(function(p){return p.value;});
    var obs=vals.filter(function(v){return v!=null;});
    if(obs.length<2)return '<span class="gap-txt">'+esc(t("notObserved"))+'</span>';
    var mn=Math.min.apply(null,obs),mx=Math.max.apply(null,obs),rng=(mx-mn)||1,step=w/(vals.length-1),pts=[];
    for(var i=0;i<vals.length;i++){if(vals[i]==null)continue;var x=i*step,y=h-((vals[i]-mn)/rng)*(h-4)-2;pts.push(x.toFixed(1)+","+y.toFixed(1));}
    var last=obs[obs.length-1],li=vals.lastIndexOf(last),lx=li*step,ly=h-((last-mn)/rng)*(h-4)-2;
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;overflow:visible"><polyline points="'+pts.join(" ")+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="3" fill="var(--primary)"/></svg>';
  }
  function growthTag(g){if(g==null)return '';var up=g>=0;return '<span class="growth '+(up?"up":"down")+'">'+(up?"▲":"▼")+' '+Math.abs(g)+'%</span>';}

  function lineChartSVG(seriesArr,opts){
    opts=opts||{};var W=560,H=opts.h||210,PL=52,PR=18,PT=16,PB=30,iw=W-PL-PR,ih=H-PT-PB;
    var ys={};seriesArr.forEach(function(s){s.pts.forEach(function(p){ys[p.year]=1;});});
    var yr=Object.keys(ys).map(Number).sort(function(a,b){return a-b;});
    var mx=0;seriesArr.forEach(function(s){s.pts.forEach(function(p){if(p.value>mx)mx=p.value;});});
    if(yr.length<2||mx<=0)return null;
    var step=niceStep(mx/4),top=Math.ceil(mx/step)*step;
    function X(y){return PL+(yr.indexOf(y)/(yr.length-1))*iw;}function Y(v){return PT+ih-(v/top)*ih;}
    var grid="";for(var tv=0;tv<=top+1;tv+=step){grid+='<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+Y(tv).toFixed(1)+'" y2="'+Y(tv).toFixed(1)+'" stroke="var(--border)" stroke-width="1"/><text x="'+(PL-8)+'" y="'+(Y(tv)+3.5).toFixed(1)+'" text-anchor="end" font-size="10" fill="var(--text-3)" font-family="IBM Plex Mono,monospace">'+esc(fmtUSD(tv).replace("$",""))+'</text>';}
    var xl=yr.map(function(y){return '<text x="'+X(y).toFixed(1)+'" y="'+(H-9)+'" text-anchor="middle" font-size="11" fill="var(--text-3)" font-family="IBM Plex Mono,monospace">'+y+'</text>';}).join("");
    var marks=seriesArr.map(function(s,i){var col=s.color||CHC[i%6],pts=s.pts.slice().sort(function(a,b){return a.year-b.year;});
      var d=pts.map(function(p,j){return (j?"L":"M")+X(p.year).toFixed(1)+","+Y(p.value).toFixed(1);}).join(" ");
      var area=opts.area?'<path d="'+d+' L'+X(pts[pts.length-1].year).toFixed(1)+','+(PT+ih)+' L'+X(pts[0].year).toFixed(1)+','+(PT+ih)+' Z" fill="'+col+'" opacity=".08"/>':"";
      var dots=pts.map(function(p){return '<circle cx="'+X(p.year).toFixed(1)+'" cy="'+Y(p.value).toFixed(1)+'" r="4" fill="'+col+'" stroke="var(--surface)" stroke-width="2"><title>'+esc(s.name)+' '+p.year+': '+esc(fmtUSD(p.value))+'</title></circle>';}).join("");
      return area+'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots;}).join("");
    return '<div class="linewrap"><svg viewBox="0 0 '+W+' '+H+'" role="img">'+grid+'<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+(PT+ih)+'" y2="'+(PT+ih)+'" stroke="var(--border-strong)"/>'+marks+xl+'</svg></div>';
  }
  function donutSVG(slices){var R=52,C=2*Math.PI*R,acc=0,seg="";
    slices.forEach(function(s){var len=Math.max(s.pct/100*C-2.5,0.5);seg+='<circle cx="66" cy="66" r="'+R+'" fill="none" stroke="'+s.color+'" stroke-width="22" stroke-dasharray="'+len.toFixed(1)+' '+(C-len).toFixed(1)+'" stroke-dashoffset="'+(-acc/100*C).toFixed(1)+'"><title>'+esc(s.label)+': '+s.pct+'%</title></circle>';acc+=s.pct;});
    return '<svg width="132" height="132" viewBox="0 0 132 132" role="img"><g transform="rotate(-90 66 66)">'+seg+'</g></svg>';}
  function kpiRow(ms){
    var top=ms[0]||{},c=top.components||{},tr=top.trend||{},g=tr.growth_pct;
    var obs=ms.filter(function(m){var cc=m.components||{};return ["market_size","saudi_position","demand_capacity","competition"].some(function(k){return cc[k]&&cc[k].value!=null;});}).length;
    function tile(l,v,foot,accent){return '<div class="kpi'+(accent?" kpi-accent":"")+'"><span class="kl">'+esc(l)+'</span>'+v+'<span class="kfoot">'+esc(foot||"")+'</span></div>';}
    function val(x,f){return x!=null?'<span class="kvv">'+f(x)+'</span>':'<span class="kvv gap">'+esc(t("notObserved"))+'</span>';}
    var gH=g!=null?'<span class="kvv" style="color:'+(g>=0?"var(--success)":"var(--danger)")+'">'+(g>=0?"▲":"▼")+" "+Math.abs(g)+'%</span>':'<span class="kvv gap">'+esc(t("notObserved"))+'</span>';
    return '<div class="kpis">'+
      tile(t("kTop")+(top.country?" · "+top.country:""),val(top.import_value,fmtUSD),prov(c.market_size),true)+
      tile(t("kShare"),val(top.saudi_share,function(v){return v+'<span class="u">%</span>';}),prov(c.saudi_position))+
      tile(t("kGrowth"),gH,tr.cagr_pct!=null?("CAGR "+tr.cagr_pct+"%"):"")+
      tile(t("kObs"),'<span class="kvv">'+obs+'<span class="u">/'+ms.length+'</span></span>',t("declaredGap")+": "+(ms.length-obs))+'</div>';
  }
  function scoreBars(ms){
    var rows=ms.filter(function(m){return m.score!=null;}).slice(0,8);
    if(!rows.length)return '<div class="chart-empty">'+esc(t("notObserved"))+'</div>';
    return '<div class="hbars">'+rows.map(function(m){
      return '<div class="hbar-row'+(m.id===S.selId?" sel":"")+'" data-goto="'+esc(m.id)+'" role="button" tabindex="0"><span class="lbl">'+esc(m.country)+'</span><span class="track"><span class="hfill" style="width:'+m.score+'%"></span></span><span class="val num">'+m.score+'</span></div>';
    }).join("")+'</div>';
  }
  function multiTrend(ms){
    var ser=[];for(var i=0;i<ms.length&&ser.length<3;i++){var p=trendPts(ms[i]);if(p)ser.push({name:ms[i].country,pts:p,color:CHC[ser.length]});}
    if(!ser.length)return '<div class="chart-empty">'+esc(t("trendNeed"))+'</div>';
    var svg=lineChartSVG(ser,{h:210});if(!svg)return '<div class="chart-empty">'+esc(t("trendNeed"))+'</div>';
    return '<div class="legend">'+ser.map(function(s){return '<span class="lg"><span class="sw" style="background:'+s.color+'"></span>'+esc(s.name)+'</span>';}).join("")+'</div>'+svg;
  }
  function supplierDonut(sel){
    var sup=((sel&&sel.competitors)||[]).filter(function(s){return s&&s.share!=null;});
    if(!sup.length)return '';
    var sl=sup.slice(0,5).map(function(s,i){return {label:s.partner||"—",pct:Math.round(s.share*10)/10,color:CHC[i]};});
    var rest=Math.round((100-sl.reduce(function(a,s){return a+s.pct;},0))*10)/10;
    if(rest>0.5)sl.push({label:t("othersL"),pct:rest,color:"var(--border-strong)"});
    return '<section class="card panel"><h3>'+esc(t("sharesDonut"))+(sel&&sel.country?" · "+esc(sel.country):"")+'</h3><div class="donutwrap">'+donutSVG(sl)+'<div class="dlegend">'+
      sl.map(function(s){return '<div class="drow2"><span class="nm"><span class="sw" style="background:'+s.color+'"></span>'+esc(s.label)+'</span><span class="num">'+s.pct+'%</span></div>';}).join("")+'</div></div></section>';
  }
  function commandCenter(ms,sel){
    return kpiRow(ms)+
      '<div class="charts">'+
        '<section class="card panel"><h3>'+esc(t("chScores"))+'</h3><div class="sub">'+esc(t("chScoresSub"))+'</div>'+scoreBars(ms)+'</section>'+
        '<section class="card panel"><h3>'+esc(t("chTrend"))+'</h3><div class="sub">'+esc(t("chTrendSub"))+'</div>'+multiTrend(ms)+'</section>'+
      '</div>'+supplierDonut(sel);
  }

  function applyLang(){
    document.documentElement.lang=S.lang;document.documentElement.dir=S.lang==="ar"?"rtl":"ltr";
    $$("[data-t]").forEach(function(el){el.textContent=t(el.getAttribute("data-t"));});
    $("#search").placeholder=t("searchPh");
    $$("#langSeg button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-lang")===S.lang);});
    var tier=$("#mpTier");if(tier){var cur=tier.value||S.card.tier||"premium";tier.innerHTML='<option value="premium">'+t("tierPrem")+'</option><option value="standard">'+t("tierStd")+'</option><option value="economy">'+t("tierEco")+'</option>';tier.value=cur;}
    var rb=$("#runBtn").querySelector("[data-t]");if(rb)rb.textContent=S.running?t("analyzing"):t("analyze");
  }

  (function initYears(){
    var Y=[];for(var y=CUR_Y;y>=CUR_Y-8;y--)Y.push(y);
    $("#yFrom").innerHTML=Y.map(function(y){return '<option value="'+y+'"'+(y===S.yearFrom?' selected':'')+'>'+y+'</option>';}).join("");
    $("#yTo").innerHTML=Y.map(function(y){return '<option value="'+y+'"'+(y===S.yearTo?' selected':'')+'>'+y+'</option>';}).join("");
  })();
  $("#yFrom").addEventListener("change",function(){S.yearFrom=+this.value;});
  $("#yTo").addEventListener("change",function(){S.yearTo=+this.value;});

  (function initCard(){
    var m={mpCost:"cost_per_unit",mpPrice:"own_price",mpShip:"shipping_per_unit",mpCap:"monthly_capacity"};
    Object.keys(m).forEach(function(id){var el=$("#"+id);if(S.card[m[id]]!=null)el.value=S.card[m[id]];el.addEventListener("change",function(){var v=parseFloat(this.value);if(isNaN(v))delete S.card[m[id]];else S.card[m[id]]=v;saveCard();});});
    var tier=$("#mpTier");tier.value=S.card.tier||"premium";tier.addEventListener("change",function(){S.card.tier=this.value;saveCard();});
  })();

  var searchT;
  $("#search").addEventListener("input",function(){S.query=this.value;clearTimeout(searchT);searchT=setTimeout(doSearch,180);});
  $("#search").addEventListener("focus",function(){if(S.query)doSearch();});
  document.addEventListener("click",function(e){
    if(!e.target.closest(".field.search:not(.mkt-field)"))$("#drop").classList.add("hidden");
    if(!e.target.closest(".mkt-field"))$("#mktDrop").classList.add("hidden");
  });

  // ── منتقي الأسواق المستهدفة — target-market picker (يضيّق silk_market_ranker.COUNTRIES) ──
  // مرجع الأسواق الـ٣٨ يُحمَّل مرة واحدة (بلا مفتاح، عبر GET /markets)؛ الفارغ = كل الأسواق
  // (سلوك الاكتشاف الحالي بلا تغيير) — اختيار سوق أو أكثر يضيّق silk_engine.analyze(countries=…).
  var mktT;
  function loadMarketsRef(){
    if(S.marketsRef)return;
    fetch(base()+"/markets").then(function(r){return r.json();}).then(function(list){
      S.marketsRef=Array.isArray(list)?list:[];
    }).catch(function(){S.marketsRef=[];});
  }
  function renderMktChips(){
    var el=$("#mktChips");if(!el)return;
    el.innerHTML=S.targetMarkets.map(function(m){
      return '<span class="mkt-chip">'+esc(m.name||m.iso3)+' <button type="button" data-iso3="'+esc(m.iso3)+'" aria-label="'+esc(t("removeMarket"))+'">×</button></span>';
    }).join("");
  }
  function doMktSearch(){
    var q=(S.mktQuery||"").trim().toLowerCase();
    var pool=S.marketsRef||[];
    var chosen={};S.targetMarkets.forEach(function(m){chosen[m.iso3]=1;});
    var rows=pool.filter(function(m){return !chosen[m.iso3]&&(!q||m.name.toLowerCase().indexOf(q)>=0||m.iso3.toLowerCase().indexOf(q)>=0);}).slice(0,12);
    if(!rows.length){$("#mktDrop").classList.add("hidden");return;}
    $("#mktDrop").innerHTML=rows.map(function(m){return '<div class="drow" data-iso3="'+esc(m.iso3)+'" data-name="'+esc(m.name)+'"><span class="nm">'+esc(m.name)+'</span><span class="hs-chip">'+esc(m.iso3)+'</span></div>';}).join("");
    $("#mktDrop").classList.remove("hidden");
  }
  $("#mktSearch").addEventListener("focus",function(){loadMarketsRef();setTimeout(doMktSearch,120);});
  $("#mktSearch").addEventListener("input",function(){S.mktQuery=this.value;clearTimeout(mktT);mktT=setTimeout(doMktSearch,120);});
  $("#mktDrop").addEventListener("click",function(e){
    var row=e.target.closest(".drow");if(!row)return;
    S.targetMarkets.push({iso3:row.getAttribute("data-iso3"),name:row.getAttribute("data-name")});
    $("#mktSearch").value="";S.mktQuery="";$("#mktDrop").classList.add("hidden");renderMktChips();
  });
  $("#mktChips").addEventListener("click",function(e){
    var btn=e.target.closest("button[data-iso3]");if(!btn)return;
    var iso3=btn.getAttribute("data-iso3");
    S.targetMarkets=S.targetMarkets.filter(function(m){return m.iso3!==iso3;});
    renderMktChips();
  });
  function doSearch(){
    fetch(base()+"/index?q="+encodeURIComponent(S.query)+"&limit=12").then(function(r){return r.json();}).then(function(list){
      if(!Array.isArray(list)||!list.length){$("#drop").classList.add("hidden");return;}
      $("#drop").innerHTML=list.map(function(it){return '<div class="drow" data-n="'+esc(it.name)+'" data-hs="'+esc(it.hs)+'"><span class="nm">'+esc(it.name)+'</span><span class="hs-chip">'+esc(it.hs)+'</span></div>';}).join("");
      $("#drop").classList.remove("hidden");
    }).catch(function(){$("#drop").classList.add("hidden");});
  }
  $("#drop").addEventListener("click",function(e){var row=e.target.closest(".drow");if(!row)return;selectProduct(row.getAttribute("data-n"),row.getAttribute("data-hs"));});
  function selectProduct(name,hs){
    S.product=name;S.hs=hs;S.raw=null;S.result=null;S.selId=null;S.query="";
    $("#search").value="";$("#drop").classList.add("hidden");
    $("#hschip").classList.remove("hidden");$("#hschip").textContent=hs;
    $("#mpHs").classList.remove("hidden");$("#mpHs").textContent=hs;
    $("#runBtn").disabled=false;renderReady();
  }

  $("#runBtn").addEventListener("click",runAnalysis);
  function buildBody(deepen){
    var span=Math.max(2,Math.min(10,S.yearTo-S.yearFrom+1));
    // Stage 2A: لا أعلام مصادر من المتصفح — سياسة الخادم تقرر المصادر كلها.
    var b={product:S.product,year:S.yearTo,persist:true,trend_span:span};
    if(S.targetMarkets.length)b.markets=S.targetMarkets.map(function(m){return m.iso3;});
    if(S.card.cost_per_unit!=null){b.product_card={cost_per_unit:S.card.cost_per_unit,tier:S.card.tier||null,monthly_capacity:S.card.monthly_capacity!=null?S.card.monthly_capacity:null,shipping_per_unit:S.card.shipping_per_unit!=null?S.card.shipping_per_unit:null};}
    if(S.card.own_price!=null)b.own_price=S.card.own_price;
    if(deepen){b.with_localprice=!!S.keys.LOCALPRICE;b.with_volza=!!S.keys.VOLZA;b.with_explee=!!S.keys.EXPLEE;b.with_ai=!!S.keys.CLAUDE;}
    return b;
  }
  function postJSON(path,body){
    return fetch(base()+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.text().then(function(tx){var d=null;try{d=JSON.parse(tx);}catch(_){}if(!r.ok){var de=d&&d.detail;throw new Error("HTTP "+r.status+" — "+(de==null?tx:(typeof de==="string"?de:JSON.stringify(de))));}return d;});});
  }
  function runAnalysis(){
    if(!S.product){$("#search").focus();return;}
    S.running=true;S.sentFlags=buildBody(false);applyLang();$("#runBtn").disabled=true;
    $("#resultArea").innerHTML='<section class="card" style="padding:24px"><div class="skl" style="width:30%"></div><div class="skl" style="width:90%;margin-top:16px"></div><div class="skl" style="width:80%;margin-top:12px"></div></section>';
    postJSON("/analyze",S.sentFlags).then(onResult).catch(onError);
  }
  function runDeepen(){
    if(!S.product)return;var paid=buildBody(true);
    if(!paid.with_localprice&&!paid.with_volza&&!paid.with_explee&&!paid.with_ai){setScreen(8);return;}
    S.running=true;S.sentFlags=paid;applyLang();postJSON("/deepen",paid).then(onResult).catch(onError);
  }
  function onResult(res){S.running=false;$("#runBtn").disabled=false;S.raw=res;S.result=mapResult(res);S.selId=S.result.markets&&S.result.markets[0]&&S.result.markets[0].id;S.mktIdx=0;applyLang();render();applyView();}
  function onError(e){S.running=false;$("#runBtn").disabled=false;applyLang();$("#completeness").classList.add("hidden");$("#resultArea").innerHTML='<section class="card err">'+esc(t("reqFail"))+': '+esc(e.message)+'</section>';}

  function confLabel(c){return c==null?"—":(c>=.66?t("high"):c>=.33?t("medium"):t("low"));}
  function mapResult(res){
    if(!res||res.classified===false)return {classified:false,product:res&&res.product,note:(res&&(res.hs_note||res.note))||null,view:(res&&res.view)||null};
    var markets=(res.markets||[]).map(function(m,i){
      var c=m.components||{};
      return {id:m.iso3+"-"+i,country:m.country,iso3:m.iso3,code:iso2(m.iso3),components:c,
        import_value:dpv(c.market_size),saudi_share:dpv(c.saudi_position),
        score:m.total_score==null?null:Math.round(m.total_score*100),confidence:m.confidence,confLabel:confLabel(m.confidence),
        income_ppp:m.income_ppp,population:m.population,tariff:m.tariff||null,top_competitor:m.top_competitor||null,
        competitors:m.competitors||[],trend:m.trend||null,jury:m.jury||null,ai:(m.jury&&m.jury.ai)||null,
        requirements:dpList(m.requirements).filter(function(r){return r&&r.value;}),
        localprice:realVals(m.localprice),price_comparison:m.price_comparison||null,
        competitive_position:m.competitive_position||null,quality_flags:m.quality_flags||[],recommendation:m.recommendation||""};
    });
    return {classified:true,product:res.product,hs:res.hs_code,hs_confidence:res.hs_confidence,year:res.year,
      analysis_id:res.analysis_id!=null?res.analysis_id:null,view:res.view&&!res.view.error?res.view:null,markets:markets};
  }

  var STEPS=[["step1","step1d",null],["step2","step2d","market_size"],["step3","step3d","demand_capacity"],["step4","step4d","competition"],["step5","step5d",null]];
  function coverage(key){var ms=(S.raw&&S.raw.markets)||[],n=0,ok=null;ms.forEach(function(m){var dp=(m.components||{})[key];if(dp&&dp.value!=null){n++;if(!ok)ok=dp;}});return {n:n,total:ms.length,ok:ok};}
  function pipeHTML(){
    var stCls,stTxt;
    if(S.running){stCls="run";stTxt=t("running");}
    else if(!S.raw){stCls="idle";stTxt=t("idle");}
    else{var top=(S.raw.markets||[])[0],j=top&&top.jury;if(j&&j.agents_with_data>0){stCls="ok";stTxt=t("completeCov")+" "+j.agents_with_data+"/"+j.agents_total+" "+t("agents");}else{stCls="warn";stTxt=t("completeGaps");}}
    var steps=STEPS.map(function(s,i){
      var col="var(--text-3)",cls="",foot=S.raw?"—":"—";
      if(!S.raw){}
      else if(i===0){if(S.raw.hs_code){col="var(--success)";foot="<b class='num'>"+esc(S.raw.hs_code)+"</b> · "+esc(S.raw.hs_confidence);}else{col="var(--warning)";cls="gap";foot=t("declaredGap");}}
      else if(i===4){var top=(S.raw.markets||[])[0],j=top&&top.jury;if(j){col=j.agents_with_data>0?"var(--primary)":"var(--warning)";cls=j.agents_with_data>0?"":"gap";foot=(S.lang==="ar"?"مرحلة ":"stage ")+(j.synthesis_stage||1);}}
      else{var cov=coverage(s[2]);if(cov.n>0){col="var(--success)";foot="<b class='num'>"+cov.n+"/"+cov.total+"</b> "+t("obs");}else{col="var(--warning)";cls="gap";foot=t("declaredGap");}}
      return '<div class="step '+cls+'"><div class="sn"><span class="num-badge">'+(i+1)+'</span><b>'+esc(t(s[0]))+'</b></div><div class="sd">'+esc(t(s[1]))+'</div><div class="sf"><span class="dot" style="background:'+col+'"></span><span>'+foot+'</span></div></div>';
    }).join("");
    return '<section class="card pipe'+(S.running?" run":"")+'"><div class="pipe-head"><div class="eyebrow">'+esc(t("pipeline"))+'</div><span class="status '+stCls+'"><span class="dot"></span>'+esc(stTxt)+'</span></div><div class="steps">'+steps+'</div></section>';
  }
  function renderCompleteness(){
    var v=S.result&&S.result.view,c=v&&v.completeness;if(!c){$("#completeness").classList.add("hidden");return;}
    var col=c.pct>=75?"var(--success)":c.pct>=40?"var(--warning)":"var(--danger)";
    $("#completeness").classList.remove("hidden");
    $("#completeness").innerHTML='<span class="comp-pct" style="color:'+col+'">'+c.pct+'%</span>'+
      '<div style="flex:1;min-width:180px"><div class="comp-label">'+esc(t("completeness"))+'</div><div class="comp-meter" style="margin-top:6px"><span class="fill" style="width:'+c.pct+'%;background:'+col+'"></span></div></div>'+
      '<span class="tag num" title="'+esc(c.label)+'">'+c.observed+'/'+c.total+' '+t("obs")+' · '+c.gap_count+' '+t("declaredGap")+'</span>';
  }

  function render(){
    if(!S.result){renderReady();return;}
    if(!S.result.classified){$("#completeness").classList.add("hidden");
      $("#resultArea").innerHTML=pipeHTML()+'<section class="card ready" style="margin-top:var(--s5)"><h2>'+esc(t("noClass"))+'</h2><p>'+esc(S.result.note||"")+'</p><div class="foot">'+esc(t("noClassFoot"))+'</div></section>';return;}
    renderCompleteness();
    var ms=S.result.markets,sel=ms.filter(function(m){return m.id===S.selId;})[0]||ms[0];S.selId=sel&&sel.id;
    $("#resultArea").innerHTML=testRunBanner()+pipeHTML()+'<div class="section-gap" style="margin-top:var(--s5)">'+heroBlock()+commandCenter(ms,sel)+'<div class="body-grid">'+tableBlock(ms,sel)+detailBlock(sel,ms)+'</div>'+duoBlock()+cultureBlock()+'</div>';
    bindEvents();
  }
  function bindEvents(){
    $$("#resultArea tbody tr").forEach(function(tr){
      function pick(){S.selId=tr.getAttribute("data-id");render();}
      tr.addEventListener("click",pick);
      tr.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();}});
    });
    $$("#resultArea .hbar-row").forEach(function(r){function go(){S.selId=r.getAttribute("data-goto");render();}r.addEventListener("click",go);r.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}});});
    $$("#resultArea .tab").forEach(function(b){b.addEventListener("click",function(){S.tab=this.getAttribute("data-tab");render();});});
    var d=$("#deepBtn");if(d)d.addEventListener("click",runDeepen);
    var j=$("#jsonBtn");if(j)j.addEventListener("click",exportJson);

    {k:null,nm:{ar:"WITS / WTO",en:"WITS / WTO"},ds:{ar:"الرسوم المطبّقة — بلا مفتاح، مفعّل دائماً.",en:"Applied tariffs — keyless, always on."}},
    {k:null,nm:{ar:"FAOSTAT",en:"FAOSTAT"},ds:{ar:"الاستهلاك للفرد — بلا مفتاح، مفعّل دائماً.",en:"Per-capita supply — keyless, always on."}},
    {k:"MAPS",nm:{ar:"Google Maps",en:"Google Maps"},ds:{ar:"المصانع والموزّعون بأسمائهم.",en:"Named factories & distributors."}},
    {k:"SEARCH",nm:{ar:"بحث الويب (Serper)",en:"Web Search (Serper)"},ds:{ar:"ثقافة المستهلك ونبض السوق — عناوين ومقالات مرصودة.",en:"Consumer culture & market pulse — observed headlines & articles."}}];
  var PAID=[{k:"LOCALPRICE",nm:{ar:"أسعار السوق المحلي",en:"Local market prices"},ds:{ar:"أسعار الرفّ الفعلية (أمازون/نون/جوميا) + مقارنة سعرك.",en:"Real shelf prices (Amazon/Noon/Jumia) + your price comparison."}},
    {k:"VOLZA",nm:{ar:"Volza",en:"Volza"},ds:{ar:"المستوردون بالاسم من بوالص الشحن.",en:"Named importers from shipping bills."}},
    {k:"EXPLEE",nm:{ar:"explee",en:"explee"},ds:{ar:"مشترون وجهات اتصال B2B.",en:"B2B buyers & contacts."}}];
  var AI=[{k:"CLAUDE",nm:{ar:"Claude (Anthropic)",en:"Claude (Anthropic)"},ds:{ar:"حَكَم وتلخيص ذكي فوق النتائج.",en:"AI judge & summary over results."}}];
  function srcCard(s){
    var has=s.k&&S.keys[s.k],ctrl="",badge,cls;
    if(s.tg){var on=!!S.toggles[s.tg];badge=on?t("obs"):"—";cls=on?"st-on":"st-off";ctrl='<button class="switch'+(on?" on":"")+'" data-tg="'+s.tg+'"><span class="k"></span></button>';}
    else if(s.k){badge=has?t("connected"):t("needsKey");cls=has?"st-on":"st-off";ctrl='<input class="keyin" type="password" data-key="'+s.k+'" value="'+esc(S.keys[s.k]||"")+'" placeholder="'+(s.k==="CLAUDE"?"sk-ant-…":"API key")+'" />';}
    else{badge=t("keyless");cls="st-on";}
    return '<div class="srccard"><div class="body"><div class="nm">'+esc(s.nm[S.lang])+'</div><div class="ds">'+esc(s.ds[S.lang])+'</div></div><span class="stbadge '+cls+'">'+esc(badge)+'</span>'+ctrl+'</div>';
  }
  var KEY_ENV={SEARCH:"SEARCH_API_KEY",MAPS:"GOOGLE_MAPS_API_KEY",LOCALPRICE:"LOCALPRICE_API_KEY",VOLZA:"VOLZA_API_KEY",EXPLEE:"EXPLEE_API_KEY",CLAUDE:"ANTHROPIC_API_KEY",COMTRADE:"COMTRADE_API_KEY"};
  function saveKeysToServer(){
    var payload={};Object.keys(S.keys).forEach(function(k){if(S.keys[k]&&KEY_ENV[k])payload[KEY_ENV[k]]=S.keys[k];});
    var hdrs={"Content-Type":"application/json"};if(S.adminKey)hdrs["X-API-Key"]=S.adminKey;
    fetch(base()+"/settings/keys",{method:"POST",headers:hdrs,body:JSON.stringify({keys:payload})})
      .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(function(){toast(t("saved"));})
      .catch(function(e){toast(t("reqFail")+": "+e.message);});
  }
  function renderSettings(){
    $("#settingsBody").innerHTML='<div class="sec-ttl">'+esc(t("secAI"))+'</div>'+AI.map(srcCard).join("")+'<div class="sec-ttl">'+esc(t("secFree"))+'</div>'+FREE.map(srcCard).join("")+'<div class="sec-ttl">'+esc(t("secPaid"))+'</div>'+PAID.map(srcCard).join("")+
      '<div class="sec-ttl">·</div>'+
      '<input class="keyin" id="adminKey" type="password" placeholder="'+esc(t("adminKey"))+'" value="'+esc(S.adminKey||"")+'" style="width:100%"/>'+
      '<button class="btn primary" id="saveKeysBtn" style="margin-top:8px">'+esc(t("saveServer"))+'</button>';
    var ak=$("#adminKey");if(ak)ak.addEventListener("input",function(){S.adminKey=this.value;localStorage.setItem("silk_admin_key",this.value);});
    var sb=$("#saveKeysBtn");if(sb)sb.addEventListener("click",saveKeysToServer);
    $$("#settingsBody .keyin").forEach(function(i){i.addEventListener("input",function(){S.keys[this.getAttribute("data-key")]=this.value;localStorage.setItem("silk_keys",JSON.stringify(S.keys));renderSettings();});});
    $$("#settingsBody .switch").forEach(function(b){b.addEventListener("click",function(){var g=this.getAttribute("data-tg");S.toggles[g]=!S.toggles[g];localStorage.setItem("silk_toggles",JSON.stringify(S.toggles));renderSettings();});});
  }

  function applyView(){
    $$("#scrnav button").forEach(function(b){b.classList.toggle("on",+b.getAttribute("data-scr")===S.screen);});
    $("#dashboard").classList.toggle("hidden",S.screen!==1);
    $("#screens").classList.toggle("hidden",!(S.screen>=2&&S.screen<=7));
    $("#settings").classList.toggle("hidden",S.screen!==8);
    $("#runBtn").classList.toggle("hidden",S.screen!==1);
    if(S.screen>=2&&S.screen<=7)renderScreen();
    if(S.screen===8){renderSettings();renderDataPanels();}
  }
  $$("#scrnav button").forEach(function(b){b.addEventListener("click",function(){setScreen(+this.getAttribute("data-scr"));});});
  $("#settingsBtn").addEventListener("click",function(){setScreen(S.screen===8?1:8);});
  $("#themeBtn").addEventListener("click",function(){var cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");var nx=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nx);localStorage.setItem("silk_theme",nx);});
  $$("#langSeg button").forEach(function(b){b.addEventListener("click",function(){S.lang=this.getAttribute("data-lang");localStorage.setItem("silk_lang",S.lang);applyLang();if(S.result)render();else renderReady();applyView();toast(t("langSwitched"));});});
  function toast(m){var el=document.createElement("div");el.className="toast";el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.style.transition="opacity .3s";el.style.opacity="0";setTimeout(function(){el.remove();},300);},1600);}

  (function init(){var th=localStorage.getItem("silk_theme");if(th)document.documentElement.setAttribute("data-theme",th);applyLang();renderReady();applyView();loadMarketsRef();})();
})();
</script>
</body>
</html>
