<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>منصة سِلك · ذكاء الأسواق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* لوحة ألوان بأسلوب Claude — warm, calm Claude-style palette (clay accent). */
    --blue:#C96442; --blue-deep:#A84C30; --blue-400:#D98E75; --blue-50:#F3EBE4;
    --ink:#1A1915; --mist:#F0EEE6; --line:#E7E2D8; --muted:#6B6862; --muted-2:#938F84; --white:#fff;
    --bg:#FAF9F5;
    --ar:"IBM Plex Sans Arabic",system-ui,Tahoma,sans-serif;
    --en:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --serif:"Amiri",Georgia,"Times New Roman",serif;
    --sh:0 1px 2px rgba(26,25,21,.04),0 4px 16px rgba(26,25,21,.05);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  @keyframes silkPulse{0%,100%{opacity:.35}50%{opacity:1}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ar);
    font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  /* عناوين بخط Serif دافئ (طابع Claude التحريري) — warm serif display headings. */
  .btitle,.dcountry,.ready h2,.settings h1{font-family:var(--serif);font-weight:700;letter-spacing:0}
  .mono{font-family:var(--mono)} .en{font-family:var(--en)}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px}
  .num{font-family:var(--en);font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* header */
  header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line)}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 0}
  .brand{display:flex;align-items:center;gap:16px}
  .mark{width:38px;height:38px;border-radius:11px;background:var(--blue);display:grid;place-items:center;
    color:#fff;font-weight:700;font-size:19px;box-shadow:0 4px 12px rgba(201,100,66,.22)}
  .sep{width:1px;height:34px;background:var(--line)}
  .btitle{font-size:18px;font-weight:600;line-height:1.1}
  .bsub{font-size:13.5px;color:var(--muted)}
  .live{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;font-weight:500;
    letter-spacing:.12em;color:var(--muted)}
  .live .d{width:7px;height:7px;border-radius:50%;background:#2ea043;box-shadow:0 0 0 3px rgba(46,160,67,.15)}
  .ghostbtn{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:9px 14px;font-size:14px;font-weight:500;transition:.18s var(--ease)}
  .ghostbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-50)}
  .primary{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border:0;
    border-radius:12px;padding:11px 20px;font-size:14.5px;font-weight:600;box-shadow:0 6px 16px rgba(201,100,66,.18);
    transition:.18s var(--ease)}
  .primary:hover{background:var(--blue-deep)} .primary:disabled{opacity:.5;box-shadow:none}

  .head-right{display:flex;align-items:center;gap:14px}

  /* control bar */
  .ctrl{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:26px 0 18px;flex-wrap:wrap}
  .search{position:relative;width:360px;max-width:100%}
  .sbox{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:40px;
    padding:11px 16px;box-shadow:var(--sh);transition:.18s var(--ease)}
  .sbox:focus-within{border-color:var(--blue);box-shadow:0 0 0 4px rgba(201,100,66,.12)}
  .sbox input{border:0;outline:0;flex:1;font-family:var(--ar);font-size:15px;background:transparent;color:var(--ink)}
  .hschip{font-family:var(--mono);font-size:12px;background:var(--blue-50);color:var(--blue);padding:3px 8px;border-radius:7px}
  .drop{position:absolute;top:calc(100% + 8px);right:0;left:0;background:#fff;border:1px solid var(--line);
    border-radius:14px;box-shadow:0 12px 34px rgba(12,14,26,.14);z-index:40;overflow:hidden;max-height:340px;overflow-y:auto}
  .drow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
  .drow:last-child{border-bottom:0} .drow:hover{background:var(--mist)}
  .drow .nm{font-size:14.5px;font-weight:500} .drow .an{font-size:11px;color:var(--blue);background:var(--blue-50);padding:2px 7px;border-radius:6px}
  .counter{font-size:14px;color:var(--muted)} .counter b{color:var(--ink);font-weight:600}
  .yearsel{display:inline-flex;align-items:center;gap:9px;font-size:13px;color:var(--muted)}
  .yearsel select{font-family:var(--ar);font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);
    border-radius:40px;padding:8px 14px;cursor:pointer;transition:.16s var(--ease)}
  .yearsel select:hover{border-color:var(--blue)} .yearsel select:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 4px rgba(201,100,66,.12)}
  .yrchip{font-size:12px;color:var(--blue);background:var(--blue-50);padding:3px 9px;border-radius:40px;margin-inline-end:8px}
  .sorts{display:flex;gap:8px}
  .sortbtn{background:#fff;border:1px solid var(--line);border-radius:40px;padding:8px 15px;font-size:13.5px;color:var(--muted);transition:.16s var(--ease)}
  .sortbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

  /* card */
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh)}
  .card.featured{position:relative;overflow:hidden}
  .card.featured::after{content:"";position:absolute;inset:auto 0 0 0;height:6px;background:var(--blue)}
  .ttl{font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.08em;color:var(--blue);text-transform:uppercase}

  /* pipeline */
  .pipe{padding:18px 20px;margin-bottom:18px}
  .pipe-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .status{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:5px 12px;border-radius:40px}
  .status.ok{background:rgba(46,160,67,.1);color:#1a7f37} .status.run{background:var(--blue-50);color:var(--blue)}
  .nodes{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .node{display:flex;flex-direction:column;gap:7px;transition:opacity .3s var(--ease)}
  .running .node{opacity:.55} .running .node .dot{animation:silkPulse 1s infinite}
  .nicon{width:38px;height:38px;border-radius:10px;background:var(--blue-50);display:grid;place-items:center;color:var(--blue)}
  .nname{font-size:14px;font-weight:600} .ndesc{font-size:13px;color:var(--muted);line-height:1.4}
  .nfoot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted-2)}
  .dot{width:7px;height:7px;border-radius:50%}
  @media(max-width:900px){.nodes{grid-template-columns:repeat(3,1fr)}}

  /* main grid */
  .main{display:grid;grid-template-columns:1.85fr 1fr;gap:18px;align-items:start}
  @media(max-width:980px){.main{grid-template-columns:1fr}}

  .rank-card{padding:6px 0}
  .rhead,.rrow{display:grid;grid-template-columns:42px 1.4fr .95fr .85fr 1.5fr auto;align-items:center;gap:10px;padding:11px 18px}
  .rhead{font-size:12.5px;color:var(--muted-2);border-bottom:1px solid var(--line)}
  .rrow{width:100%;text-align:right;background:transparent;border:0;border-bottom:1px solid var(--line);transition:.15s var(--ease)}
  .rrow:hover{background:var(--mist)} .rrow.sel{background:var(--blue-50);box-shadow:inset 2px 0 0 var(--blue)}
  .rk{font-family:var(--en);font-size:20px;font-weight:700;color:var(--blue)}
  .cty{display:flex;align-items:center;gap:9px} .ccode{font-family:var(--mono);font-size:11.5px;background:var(--mist);padding:3px 7px;border-radius:6px;color:var(--muted)}
  .cname{font-size:15.5px;font-weight:600} .rval{font-size:15px;font-weight:600}
  .share{font-size:14.5px;color:var(--muted)} .share.hi{color:var(--blue);font-weight:600}
  .scell{display:flex;align-items:center;gap:9px} .sval{font-family:var(--en);font-weight:700;color:var(--blue);font-size:15px;min-width:30px}
  .track{flex:1;height:7px;background:var(--mist);border-radius:5px;overflow:hidden} .fill{height:100%;background:var(--blue);border-radius:5px}
  .confpill{font-size:12px;color:var(--muted);background:var(--mist);padding:3px 9px;border-radius:40px;white-space:nowrap}
  .aiblk{margin:14px 0;padding:14px 16px;background:var(--blue-50);border:1px solid #E7E2D8;border-radius:11px}
  .aihd{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .aibadge{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:#fff;background:var(--blue);padding:4px 10px;border-radius:40px}
  .aiconf{font-size:12.5px;color:var(--muted)}
  .aitext{margin-top:9px;font-size:14px;line-height:1.65;color:var(--ink)}
  .aiby{margin-top:7px;font-size:11.5px;color:var(--muted-2);font-family:var(--mono)}
  .plblk{margin:12px 0;padding-top:12px;border-top:1px solid var(--line)}
  .plhd{font-size:13px;color:var(--muted)} .plhd b{color:var(--blue)}
  .pllist{margin:8px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:5px}
  .pllist li{font-size:13.5px;color:var(--ink)}
  .prate{color:#d4a72c;font-size:12px} .pstore{color:var(--muted-2);font-size:12px}
  .pprice{font-family:var(--en);font-weight:700;color:var(--blue)}
  .cshare{font-family:var(--en);font-weight:700;color:var(--blue);font-size:13px}
  .ssrc{font-family:var(--mono);font-size:10.5px;color:var(--blue);background:var(--blue-50);padding:2px 7px;border-radius:6px}
  .needkey{margin-top:7px;font-size:12.5px;line-height:1.6;color:var(--muted);background:var(--mist);
    border:1px dashed var(--line);border-radius:9px;padding:9px 12px}
  .pstore[href]{color:var(--blue);text-decoration:none} .pstore[href]:hover{text-decoration:underline}
  .ovl{position:fixed;inset:0;background:rgba(12,14,26,.55);display:grid;place-items:center;z-index:50;padding:24px}
  .ovbox{background:#fff;border-radius:14px;max-width:760px;width:100%;max-height:84vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .ovhd{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
  .ovbody{padding:20px;overflow:auto;font-size:14.5px;line-height:1.8;color:var(--ink)}
  .srcstrip{padding:11px 18px;background:var(--mist);font-size:12.5px;color:var(--muted-2);font-family:var(--mono)}

  /* detail */
  .detail{padding:20px;position:sticky;top:90px}
  .dtop{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .verdict{font-size:12.5px;font-weight:600;padding:4px 11px;border-radius:40px}
  .v-strong{background:rgba(46,160,67,.12);color:#1a7f37} .v-mid{background:var(--blue-50);color:var(--blue)} .v-low{background:#fdecec;color:#b42318}
  .dcountry{font-size:30px;font-weight:700;line-height:1.1;margin:8px 0 2px}
  .bigscore{display:flex;align-items:baseline;gap:6px;margin:10px 0 16px}
  .bigscore .n{font-family:var(--en);font-size:72px;font-weight:700;color:var(--blue);line-height:.9}
  .bigscore .o{font-size:18px;color:var(--muted-2)}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .stat{background:var(--mist);border-radius:10px;padding:12px}
  .stat .l{font-size:12.5px;color:var(--muted)} .stat .v{font-size:18px;font-weight:600;margin-top:3px}
  .drow2{font-size:14px;color:var(--muted);margin:10px 0} .drow2 b{color:var(--ink)}
  .note{font-size:14.5px;color:var(--ink);background:var(--blue-50);border-radius:10px;padding:13px;margin:14px 0;line-height:1.6}
  .srcs{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}
  .srcs span{font-family:var(--mono);font-size:11.5px;background:var(--mist);color:var(--muted);padding:4px 9px;border-radius:7px}
  .dbtns{display:flex;gap:10px;margin-top:14px}

  /* ready */
  .ready{padding:28px;text-align:center;max-width:680px;margin:0 auto}
  .ready .hs{font-family:var(--mono);font-size:13px;background:var(--blue-50);color:var(--blue);padding:5px 12px;border-radius:8px;display:inline-block;margin-bottom:14px}
  .ready h2{font-size:24px;margin:0 0 8px} .ready p{color:var(--muted);margin:0 0 18px}
  .ready .foot{font-size:13px;color:var(--muted-2);margin-top:16px}

  /* settings */
  .settings{max-width:860px;margin:26px auto 60px}
  .settings h1{font-size:26px;margin:0 0 6px} .settings .sub{color:var(--muted);margin-bottom:24px}
  .sec-ttl{font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;margin:24px 0 12px}
  .srccard{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;box-shadow:var(--sh)}
  .srccard .ic{width:46px;height:46px;border-radius:11px;background:var(--mist);display:grid;place-items:center;color:var(--blue);flex:none}
  .srccard .body{flex:1;min-width:0} .srccard .nm{font-size:16.5px;font-weight:600} .srccard .ds{font-size:14px;color:var(--muted)}
  .stbadge{font-size:12px;padding:3px 10px;border-radius:40px;white-space:nowrap}
  .st-on{background:rgba(46,160,67,.12);color:#1a7f37} .st-off{background:var(--mist);color:var(--muted)} .st-opt{background:var(--blue-50);color:var(--blue)}
  .keyin{font-family:var(--mono);font-size:13px;border:1px solid var(--line);border-radius:9px;padding:9px 12px;width:230px;max-width:40vw;outline:0}
  .keyin:focus{border-color:var(--blue)}
  .switch{width:46px;height:26px;border-radius:40px;background:var(--line);position:relative;border:0;transition:.2s var(--ease);flex:none}
  .switch.on{background:var(--blue)} .switch .k{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s var(--ease)}
  .switch.on .k{right:23px}
  .skl{height:14px;background:linear-gradient(90deg,#F0EEE6,#FAF9F5,#F0EEE6);background-size:200% 100%;border-radius:6px;animation:silkPulse 1.2s infinite}
  .err{color:#b42318;background:#fdecec;border-radius:10px;padding:12px;font-size:14px}
</style>
</head>
<body>
<header>
  <div class="wrap hrow">
    <div class="brand">
      <div class="mark">س</div>
      <div class="sep"></div>
      <div>
        <div class="btitle">منصة سِلك · ذكاء الأسواق</div>
        <div class="bsub">تصفية وترتيب أسواق التصدير — قرار أوّلي مبنيّ على مصدر موثّق</div>
      </div>
    </div>
    <div class="head-right">
      <span class="live"><span class="d"></span>MULTI-AGENT · LIVE</span>
      <button class="ghostbtn" id="viewToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 2.8v2.4M12 18.8v2.4M4.3 4.3l1.7 1.7M18 18l1.7 1.7M2.8 12h2.4M18.8 12h2.4M4.3 19.7l1.7-1.7M18 6l1.7-1.7"></path></svg><span id="viewLabel">الإعدادات</span></button>
      <button class="primary" id="runBtn">وزِّع المهام على الوكلاء</button>
    </div>
  </div>
</header>

<!-- ===== DASHBOARD ===== -->
<main id="dashboard" class="wrap" style="padding-top:6px;padding-bottom:60px">
  <div class="ctrl">
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div class="search">
        <div class="sbox">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
          <input id="search" placeholder="ابحث عن منتج… (تمور، زعفران، عسل)" autocomplete="off" />
          <span class="hschip" id="hschip" style="display:none"></span>
        </div>
        <div class="drop hidden" id="drop"></div>
      </div>
      <label class="yearsel"><span>سنة البيانات</span><select id="year"></select></label>
      <label class="yearsel"><span>سعرك (اختياري)</span><input id="ownPrice" type="number" min="0" step="0.01"
        placeholder="مثلاً 25.00" style="font-family:var(--en);font-size:14px;color:var(--ink);background:#fff;
        border:1px solid var(--line);border-radius:40px;padding:8px 14px;width:110px" /></label>
      <span class="counter hidden" id="counter"></span>
    </div>
    <div class="sorts hidden" id="sorts">
      <button class="sortbtn on" data-sort="score">الأعلى نقاطاً</button>
      <button class="sortbtn" data-sort="imports">حجم الاستيراد</button>
      <button class="sortbtn" data-sort="share">حصة السعودية</button>
    </div>
  </div>

  <!-- agent pipeline -->
  <section class="card pipe" id="pipe">
    <div class="pipe-head">
      <div class="ttl">AGENT PIPELINE · خط الوكلاء</div>
      <span class="status ok" id="pipeStatus">القرار الأوّلي جاهز</span>
    </div>
    <div class="nodes" id="nodes"></div>
  </section>

  <div id="resultArea"></div>
</main>

<!-- ===== SETTINGS ===== -->
<main id="settings" class="wrap hidden">
  <div class="settings">
    <h1>الإعدادات والمصادر</h1>
    <div class="sub">المفاتيح تُحفظ محلياً في متصفحك. لتفعيلها فعلياً على الخادم، أضِفها في Render → Environment بنفس الأسماء.</div>
    <div id="settingsBody"></div>
  </div>
</main>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var ICONS={
    globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/>',
    chart:'<path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-8"/>',
    factory:'<path d="M3 21V10l5 3V10l5 3V7l5 3v11zM3 21h18"/>',
    package:'<path d="M12 3l8 4.5v9L12 21l-8-4.5v-9zM4 7.5l8 4.5 8-4.5M12 12v9"/>',
    doc:'<path d="M7 3h7l4 4v14H7zM14 3v4h4"/>',
    ship:'<path d="M3 14l9-4 9 4-2 6H5zM12 3v7M8 6h8"/>',
    truck:'<path d="M3 6h11v9H3zM14 9h4l3 3v3h-7zM7 18a2 2 0 100-4 2 2 0 000 4zM18 18a2 2 0 100-4 2 2 0 000 4z"/>',
    plane:'<path d="M10 3l1.5 7L21 14v2l-9-2-1 5 2 2v1l-3-1-3 1v-1l2-2-1-5-9 2v-2l9.5-4L10 3z"/>'
  };
  function svg(name){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||ICONS.doc)+'</svg>';}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  var ISO2={SAU:"SA",ARE:"AE",EGY:"EG",MAR:"MA",DZA:"DZ",TUN:"TN",KWT:"KW",QAT:"QA",BHR:"BH",OMN:"OM",JOR:"JO",IRQ:"IQ",LBN:"LB",TUR:"TR",IND:"IN",PAK:"PK",IDN:"ID",MYS:"MY",CHN:"CN",USA:"US",GBR:"GB",DEU:"DE",FRA:"FR",NLD:"NL",ESP:"ES",ITA:"IT",CAN:"CA",NGA:"NG",KEN:"KE",ZAF:"ZA",ETH:"ET",SDN:"SD",YEM:"YE",BGD:"BD",SGP:"SG",JPN:"JP",KOR:"KR",RUS:"RU",BRA:"BR"};
  function iso2(i){return ISO2[i]||(i||"").slice(0,2);}

  // ---------- state ----------
  var S={product:"",hs:"",sort:"score",selId:null,running:false,query:"",open:false,
    view:"dashboard",result:null,jobId:null,
    year:parseInt(localStorage.getItem("silk_year")||"2023",10),
    ownPrice:parseFloat(localStorage.getItem("silk_own_price")||"")||null,

  function base(){return (localStorage.getItem("silk_api")||"").trim().replace(/\/+$/,"");}
  function saveKeys(){localStorage.setItem("silk_settings_keys",JSON.stringify(S.keys));}
  function saveToggles(){localStorage.setItem("silk_settings_toggles",JSON.stringify(S.toggles));}

  // ---------- auth (magic-link + bearer session) ----------
  function setSession(tok){S.session=tok||"";localStorage.setItem("silk_session",S.session);updateChrome();}
  function authHeaders(extra){var h=extra||{};if(S.session)h["Authorization"]="Bearer "+S.session;return h;}
  function loggedIn(){return !!S.session;}
  function logout(){setSession("");render();}
  // استخرج الرمز من رابط سحري أو نصّ ملصوق — pull the token out of a pasted link/token.
  function extractToken(s){s=(s||"").trim();var m=s.match(/[?&]token=([^&\s]+)/);return m?decodeURIComponent(m[1]):s;}
  function verifyToken(tok,cb){
    fetch(base()+"/auth/verify?token="+encodeURIComponent(tok))
      .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
      .then(function(x){if(x.ok&&x.d&&x.d.session_token){setSession(x.d.session_token);cb&&cb(null,x.d);}
        else{cb&&cb(new Error((x.d&&x.d.detail)||"رابط غير صالح أو منتهٍ"));}})
      .catch(function(e){cb&&cb(e);});
  }
  function requestLink(email,cb){
    fetch(base()+"/auth/request-link",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:email})})
      .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
      .then(function(x){cb&&cb(x.ok?null:new Error((x.d&&x.d.detail)||"تعذّر إرسال الرابط"),x.d);})
      .catch(function(e){cb&&cb(e);});
  }

  // ---------- pipeline render ----------
  var NODES=[

  // ---------- year selector ----------
  (function initYears(){

  });
  $("ownPrice").value=S.ownPrice==null?"":S.ownPrice;
  $("ownPrice").addEventListener("change",function(){

  document.addEventListener("click",function(e){if(!e.target.closest(".search")){$("drop").classList.add("hidden");}});
  function doSearch(){

  // ---------- run analysis (async: enqueue -> poll job) ----------
  $("runBtn").addEventListener("click",runAnalysis);
  var pollT;
  function runAnalysis(){
    if(!S.product){$("search").focus();return;}
    if(!loggedIn()){S.view="settings";applyView();return;}  // auth required for paid work
    S.running=true;S.jobId=null;renderNodes();updateChrome();
    $("resultArea").innerHTML='<section class="card" style="padding:22px"><div class="skl" style="width:30%"></div><div class="skl" style="width:90%;margin-top:14px"></div><div class="skl" style="width:80%;margin-top:10px"></div></section>';
    var g=S.toggles;
    var body={product:S.product,year:S.year,
      with_trends:!!g.trends,with_tariffs:!!S.keys.WITS,
      with_faostat:!!S.keys.FAOSTAT,with_maps:!!S.keys.MAPS,
      with_localprice:!!S.keys.LOCALPRICE,own_price:S.ownPrice,
      with_market_size:!!g.groupA,with_demographics:!!g.groupB,
      with_competition:!!g.groupC,with_compliance:!!g.groupD,with_culture:!!g.groupE,
      // الأدوات المدفوعة (Volza/explee) لا تُرسَل مع /analyze إطلاقاً — تُستدعى
      // حصراً عبر زر «تعميق التحليل» (/deepen). paid tools are deepen-only.
      with_ai:!!S.keys.CLAUDE,with_synthesis:!!S.keys.CLAUDE&&!!g.synthesis};
    fetch(base()+"/analyze",{method:"POST",headers:authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(body)})
      .then(function(r){return r.text().then(function(t){var d=null;try{d=JSON.parse(t);}catch(_){}
        if(r.status===401){setSession("");throw new Error("انتهت الجلسة — سجّل الدخول من الإعدادات");}
        if(!r.ok){var de=d&&d.detail;throw new Error("HTTP "+r.status+" — "+(de==null?t:(typeof de==="string"?de:JSON.stringify(de))));}return d;});})
      .then(function(out){if(!out||!out.job_id)throw new Error("لا معرّف مهمة في الردّ");
        S.jobId=out.job_id;pollJob(out.job_id);})
      .catch(function(e){S.running=false;renderNodes();$("resultArea").innerHTML='<section class="card err" style="margin-top:4px">فشل الطلب: '+esc(e.message)+'</section>';updateChrome();});
  }
  function pollJob(jobId){
    clearTimeout(pollT);
    fetch(base()+"/jobs/"+encodeURIComponent(jobId),{headers:authHeaders()})
      .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
      .then(function(x){
        if(!x.ok){throw new Error((x.d&&x.d.detail)||"تعذّر جلب حالة المهمة");}
        var st=x.d.status;
        if(st==="finished"){S.running=false;S.result=mapResult(x.d.result);
          S.selId=S.result&&S.result.markets&&S.result.markets[0]&&S.result.markets[0].id;
          renderNodes();render();updateChrome();return;}
        if(st==="failed"){S.running=false;renderNodes();
          $("resultArea").innerHTML='<section class="card err" style="margin-top:4px">فشل التحليل: '+esc(x.d.error||"غير معروف")+'</section>';updateChrome();return;}
        pollT=setTimeout(function(){pollJob(jobId);},2500);  // queued|running -> keep polling
      })
      .catch(function(e){S.running=false;renderNodes();$("resultArea").innerHTML='<section class="card err" style="margin-top:4px">فشل متابعة المهمة: '+esc(e.message)+'</section>';updateChrome();});
  }
  // تنزيل تقرير عبر جلب blob مع ترويسة الجلسة — download a report (auth blob fetch).
  function downloadReport(kind){
    if(!S.jobId){return;}
    var url=base()+"/reports/"+encodeURIComponent(S.jobId)+"/"+kind;
    fetch(url,{headers:authHeaders()}).then(function(r){
      if(!r.ok){return r.json().then(function(d){throw new Error((d&&d.detail)||("HTTP "+r.status));});}
      return r.blob();
    }).then(function(b){var a=document.createElement("a");a.href=URL.createObjectURL(b);
      a.download="silk_"+kind;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},4000);
    }).catch(function(e){alert("تعذّر تنزيل التقرير: "+e.message);});
  }

  // تعميق التحليل (المجموعة و، مدفوع) — run the PAID deepen layer on top markets.
  function runDeepen(){
    if(!S.jobId){return;}
    if(!loggedIn()){S.view="settings";applyView();return;}
    var ov=document.createElement("div");ov.className="ovl";
    ov.innerHTML='<div class="ovbox"><div class="ovhd"><span class="aibadge">تعميق التحليل · Volza/explee/Maps/D&B</span>'+
      '<button class="ghostbtn" id="ovClose">إغلاق</button></div><div class="ovbody" id="deepBody">جارٍ التعميق على أعلى الأسواق…</div></div>';
    document.body.appendChild(ov);
    function close(){ov.remove();}
    ov.addEventListener("click",function(e){if(e.target===ov)close();});
    $("ovClose").addEventListener("click",close);
    fetch(base()+"/deepen/"+encodeURIComponent(S.jobId),{method:"POST",headers:authHeaders()})
      .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
      .then(function(x){
        if(!x.ok){$("deepBody").innerHTML='<div class="err">تعذّر التعميق: '+esc((x.d&&x.d.detail)||"خطأ")+'</div>';return;}
        $("deepBody").innerHTML=deepHtml(x.d);
      }).catch(function(e){$("deepBody").innerHTML='<div class="err">فشل: '+esc(e.message)+'</div>';});
  }
  function deepList(title,findings,pick){
    var real=realVals(findings);
    if(!real.length)return '<div class="plhd" style="margin-top:8px"><b>'+title+'</b> — <span class="pstore">يتطلب مفتاحاً (لا اختلاق)</span></div>';
    var rows=real.slice(0,6).map(function(v){return '<li>'+esc(pick(v))+'</li>';}).join("");
    return '<div class="plhd" style="margin-top:8px"><b>'+title+'</b> — '+real.length+'</div><ul class="pllist">'+rows+'</ul>';
  }
  function deepHtml(d){
    var ms=(d&&d.markets)||[];
    if(!ms.length)return '<div class="needkey">لا أسواق للتعميق.</div>';
    return ms.map(function(m){
      return '<div class="plblk"><div class="plhd" style="font-size:15px"><b>'+esc(m.country||m.iso3)+'</b></div>'+
        deepList("مصانع/موزّعون (Maps)",m.maps,function(v){return (v.name||"")+(v.rating?(" ★"+v.rating):"");})+
        deepList("مستوردون (Volza)",m.volza,function(v){return typeof v==="object"?(v.name||v.importer||JSON.stringify(v)):v;})+
        deepList("مشترون B2B (explee)",m.explee,function(v){return typeof v==="object"?(v.name||v.company||JSON.stringify(v)):v;})+
        deepList("تحقق الشرعية (D&B)",m.dnb,function(v){return typeof v==="object"?((v.name||"")+" · DUNS "+(v.duns||"—")):v;})+
      '</div>';
    }).join("")+'<div class="needkey" style="margin-top:10px">'+esc(d.note||"")+'</div>';
  }

  // ---------- map engine result -> dashboard model ----------
  function dpv(c){return c&&typeof c==="object"?c.value:c;}
  function realVals(list){return (list||[]).map(function(f){return f&&f.value;}).filter(function(v){return v!=null;});}
  function mapResult(res){
    if(!res||res.classified===false)return {classified:false,product:res&&res.product,note:res&&res.note};
    var markets=(res.markets||[]).map(function(m,i){
      var c=m.components||{};
      var score=m.total_score==null?null:Math.round(m.total_score*100);
      var conf=m.confidence==null?null:(m.confidence>=.66?"عالية":m.confidence>=.33?"متوسطة":"منخفضة");
      var factories=realVals(m.maps);          // مصانع/موزعون بالاسم — named players
      var prices=realVals(m.localprice);       // أسعار التجزئة الفعلية — real prices
      var ai=m.jury&&m.jury.ai?m.jury.ai:null; // حكم كلود — Claude's verdict
      // الموردون وتجار الجملة (Maps + Volza + explee) — consolidated named businesses
      var suppliers=[];
      factories.forEach(function(p){suppliers.push({name:p.name||p,source:"Google Maps",detail:p.rating?("★"+p.rating):(p.address||"مصنع/موزّع")});});
      realVals(m.volza).forEach(function(v){suppliers.push({name:typeof v==="object"?(v.name||v.importer):v,source:"Volza",detail:"مستورد (بوالص شحن)"});});
      realVals(m.explee).forEach(function(v){suppliers.push({name:typeof v==="object"?(v.name||v.company):v,source:"Explee",detail:"مورّد / جهة B2B"});});
      return {
        id:m.iso3+"-"+i,country:m.country,code:iso2(m.iso3),
        import_value:dpv(c.market_size),
        saudi_share:dpv(c.saudi_position),
        score:score,confidence:conf,
        income_ppp:m.income_ppp!=null?m.income_ppp:null,
        population:m.population!=null?m.population:null,
        top_competitor:m.top_competitor||null,
        competitors:m.competitors||[],// [{partner,share,value_usd}] — الدول المنافسة وحصصها
        importers:realVals(m.importers),// مستوردون محتملون (بحث ويب مجاني) — free importer leads
        factories:factories,        // [{name,rating,...}]
        suppliers:suppliers,        // [{name,source,detail}] — الموردون وتجار الجملة
        prices:prices,              // [{title,price,currency,store,is_best_seller,...}] — منتجات منافسة + أسعار
        price_comparison:m.price_comparison||null, // مقارنة سعرك بالسوق المرصود
        ai:ai,                      // {verdict,confidence,reasoning,by}
        synthesis:m.synthesis||null,// تركيب كلود — {verdict,opportunities,risks,recommendations,gaps}
        note:(m.jury&&m.jury.verdict)?m.jury.verdict:(m.recommendation||""),
        sources:Object.keys(c).map(function(k){return c[k]&&c[k].source;}).filter(Boolean)
      };
    });
    return {classified:true,product:res.product,hs:res.hs_code,
      year:res.year,report:res.report||null,
      culture:realVals(res.websearch),   // ثقافة المستهلك — web-search findings
      markets:markets};
  }
  function verdict(score){return score==null?{t:"بحاجة تحقّق",c:"v-low"}:score>=82?{t:"مرشّح قوي",c:"v-strong"}:score>=70?{t:"مرشّح",c:"v-mid"}:{t:"بحاجة تحقّق",c:"v-low"};}
  function fmtUSD(v){if(v==null)return "—";var n=Number(v);if(n>=1e9)return "$"+(n/1e9).toFixed(1)+"B";if(n>=1e6)return "$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return "$"+(n/1e3).toFixed(0)+"K";return "$"+n.toLocaleString("en-US");}
  function fmtNum(v){if(v==null)return "—";var n=Number(v);if(isNaN(n))return esc(v);if(n>=1e6)return (n/1e6).toFixed(1)+"M";if(n>=1e3)return (n/1e3).toFixed(0)+"K";return n.toLocaleString("en-US");}

  // ---------- render ----------
  function sorted(markets){
    var k=S.sort==="imports"?"import_value":S.sort==="share"?"saudi_share":"score";
    return markets.slice().sort(function(a,b){return (b[k]||0)-(a[k]||0);});
  }
  function render(){

    if(!S.result.classified){$("resultArea").innerHTML='<section class="card ready"><h2>تعذّر تصنيف المنتج</h2><p>'+esc(S.result.note||"جرّب اسماً أوضح.")+'</p></section>';return;}
    var ms=sorted(S.result.markets);
    var sel=ms.filter(function(m){return m.id===S.selId;})[0]||ms[0];S.selId=sel.id;
    // ranking list
    var rows='<div class="rhead"><div>#</div><div>السوق</div><div>الاستيراد</div><div>حصة السعودية</div><div>النقاط</div><div>الثقة</div></div>';
    ms.forEach(function(m,i){
      var sh=m.saudi_share==null?"—":m.saudi_share+"%";

        '<div class="rval num">'+fmtUSD(m.import_value)+'</div>'+
        '<div class="share'+(m.saudi_share>=30?' hi':'')+' num">'+sh+'</div>'+
        '<div class="scell"><span class="sval">'+(m.score==null?"—":m.score)+'</span><span class="track"><span class="fill" style="width:'+(m.score||0)+'%"></span></span></div>'+
        '<div><span class="confpill">'+(m.confidence||"—")+'</span></div></button>';
    });
    var srcSet={};S.result.markets.forEach(function(m){(m.sources||[]).forEach(function(s){srcSet[s]=1;});});
    rows+='<div class="srcstrip">المصادر: '+(Object.keys(srcSet).join(" · ")||"—")+'</div>';
    // detail
    var v=verdict(sel.score);
    var detail='<section class="card featured detail">'+
      '<div class="dtop"><span class="ccode mono">'+esc(sel.code)+'</span><span class="confpill">المرتبة '+(ms.indexOf(sel)+1)+'</span><span class="verdict '+v.c+'">'+v.t+'</span></div>'+
      '<div class="dcountry">'+esc(sel.country)+'</div>'+
      '<div class="bigscore"><span class="n">'+(sel.score==null?"—":sel.score)+'</span><span class="o">/100</span></div>'+
      '<div class="stats">'+
        '<div class="stat"><div class="l">قيمة الاستيراد</div><div class="v num">'+fmtUSD(sel.import_value)+'</div></div>'+
        '<div class="stat"><div class="l">حصة السعودية</div><div class="v num">'+(sel.saudi_share==null?"—":sel.saudi_share+"%")+'</div></div>'+
        '<div class="stat"><div class="l">دخل الفرد (PPP)</div><div class="v num">'+fmtUSD(sel.income_ppp)+'</div></div>'+
        '<div class="stat"><div class="l">السكان</div><div class="v num">'+fmtNum(sel.population)+'</div></div>'+
      '</div>'+
      '<div class="drow2">المنافس المهيمن: <b>'+esc(sel.top_competitor||"—")+'</b></div>'+
      synthBlock(sel)+aiBlock(sel)+competitorsBlock(sel)+importersBlock(sel)+pricesBlock(sel)+suppliersBlock(sel)+cultureBlock()+
      (sel.note?'<div class="note">'+esc(sel.note)+'</div>':'')+
      '<div class="srcs">'+(sel.sources||[]).map(function(s){return '<span>'+esc(s)+'</span>';}).join("")+'</div>'+
      '<div class="dbtns">'+
        (S.jobId?'<a class="ghostbtn" href="'+base()+'/dashboard/'+encodeURIComponent(S.jobId)+'" target="_blank" rel="noopener">لوحة دائمة ↗</a>'+
                 '<button class="ghostbtn" id="repFull">تقرير كامل (Word)</button>'+
                 '<button class="ghostbtn" id="repShort">مختصر (Word)</button>'+
                 '<button class="ghostbtn" id="repPdf">مختصر (PDF)</button>':'')+
        '<button class="ghostbtn" id="deepBtn">دراسة عميقة · Volza/explee</button>'+
        (S.result.report?'<button class="ghostbtn" id="reportBtn">تقرير كلود</button>':'')+
        '<button class="primary" id="exportBtn">تصدير CSV</button></div>'+
    '</section>';
    $("resultArea").innerHTML='<div class="main"><section class="card rank-card">'+rows+'</section>'+detail+'</div>';
    $("counter").classList.remove("hidden");
    $("counter").innerHTML='<b>'+ms.length+'</b> أسواق مرشّحة'+(S.result.year?' <span class="yrchip">بيانات '+S.result.year+'</span>':'');
    $("sorts").classList.remove("hidden");
