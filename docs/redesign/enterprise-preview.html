<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Silk · Enterprise UI Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     Silk Enterprise Design System — Carbon × Redwood
     ========================================================= */
  :root{
    --bg:#F4F4F4; --surface:#FFFFFF; --surface-2:#F7F7F7; --hover:#E8E8E8;
    --border:#E0E0E0; --border-strong:#C6C6C6;
    --text:#161616; --text-2:#525252; --text-3:#6F6F6F;
    --primary:#0F62FE; --primary-hover:#0353E9; --primary-active:#002D9C;
    --primary-soft:#EDF5FF; --brand:#C74634; --brand-soft:#FBECE9;
    --success:#198038; --success-soft:#DEFBE6;
    --warning:#B28600; --warning-soft:#FCF4D6;
    --danger:#DA1E28; --danger-soft:#FFF1F1;
    --info:#0043CE; --info-soft:#EDF5FF;
    --focus:#0F62FE;
    --shadow:0 1px 2px rgba(22,22,22,.06),0 8px 24px rgba(22,22,22,.08);
    --shadow-lg:0 2px 6px rgba(22,22,22,.10),0 16px 40px rgba(22,22,22,.14);
    --sans-ar:"IBM Plex Sans Arabic",system-ui,Tahoma,sans-serif;
    --sans-en:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --ease:cubic-bezier(.2,.6,.3,1);
    --r:6px; --r-lg:10px;
    --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px; --sp6:32px; --sp7:48px;
  }
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]){
    --bg:#161616; --surface:#262626; --surface-2:#2C2C2C; --hover:#333333;
    --border:#393939; --border-strong:#525252;
    --text:#F4F4F4; --text-2:#C6C6C6; --text-3:#A8A8A8;
    --primary:#4589FF; --primary-hover:#78A9FF; --primary-active:#A6C8FF;
    --primary-soft:#1F2A44; --brand:#FF8A75; --brand-soft:#2E1F1B;
    --success:#42BE65; --success-soft:#1A2E20;
    --warning:#F1C21B; --warning-soft:#332C0E;
    --danger:#FA4D56; --danger-soft:#341A1C;
    --info:#4589FF; --info-soft:#1F2A44;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);
    --shadow-lg:0 2px 8px rgba(0,0,0,.5),0 20px 48px rgba(0,0,0,.6);
  }}
  :root[data-theme="dark"]{
    --bg:#161616; --surface:#262626; --surface-2:#2C2C2C; --hover:#333333;
    --border:#393939; --border-strong:#525252;
    --text:#F4F4F4; --text-2:#C6C6C6; --text-3:#A8A8A8;
    --primary:#4589FF; --primary-hover:#78A9FF; --primary-active:#A6C8FF;
    --primary-soft:#1F2A44; --brand:#FF8A75; --brand-soft:#2E1F1B;
    --success:#42BE65; --success-soft:#1A2E20;
    --warning:#F1C21B; --warning-soft:#332C0E;
    --danger:#FA4D56; --danger-soft:#341A1C;
    --info:#4589FF; --info-soft:#1F2A44;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);
    --shadow-lg:0 2px 8px rgba(0,0,0,.5),0 20px 48px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans-ar);
    font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
    transition:background .3s var(--ease),color .3s var(--ease)}
  html[lang="en"] body{font-family:var(--sans-en)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
  button{font-family:inherit;cursor:pointer;color:inherit}
  a{color:var(--primary);text-decoration:none}
  :focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @keyframes slideup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .shell{max-width:1320px;margin:0 auto;padding-inline:var(--sp5)}
  @media(max-width:640px){.shell{padding-inline:var(--sp4)}}

  header.appbar{position:sticky;top:0;z-index:50;background:var(--surface);
    border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
  .appbar-row{display:flex;align-items:center;gap:var(--sp4);height:64px}
  .brand{display:flex;align-items:center;gap:var(--sp3);min-width:0}
  .logo{width:40px;height:40px;border-radius:8px;background:var(--brand);display:grid;place-items:center;
    color:#fff;font-weight:700;font-size:20px;flex:none}
  .brand .t{font-size:18px;font-weight:600;line-height:1.2;white-space:nowrap}
  .brand .s{font-size:13px;color:var(--text-3)}
  .appbar-spacer{flex:1}
  .appbar-actions{display:flex;align-items:center;gap:var(--sp3)}
  @media(max-width:720px){.brand .s{display:none}}
  .seg{display:inline-flex;border:1px solid var(--border-strong);border-radius:var(--r);overflow:hidden}
  .seg button{padding:9px 16px;font-size:14px;font-weight:600;background:var(--surface);color:var(--text-2);border:0;transition:.15s var(--ease);min-width:52px}
  .seg button+button{border-inline-start:1px solid var(--border)}
  .seg button.on{background:var(--primary);color:#fff}
  .seg button:not(.on):hover{background:var(--hover)}
  .iconbtn{display:inline-grid;place-items:center;width:44px;height:44px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r);color:var(--text-2);transition:.15s var(--ease)}
  .iconbtn:hover{background:var(--hover);color:var(--text)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:48px;padding-inline:20px;font-size:15px;font-weight:600;border-radius:var(--r);border:1px solid transparent;transition:.15s var(--ease);white-space:nowrap}
  .btn svg{flex:none}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-hover)} .btn-primary:active{background:var(--primary-active)}
  .btn-secondary{background:transparent;color:var(--primary);border-color:var(--primary)}
  .btn-secondary:hover{background:var(--primary-soft)}
  .btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border-strong)}
  .btn-ghost:hover{background:var(--hover);color:var(--text)}
  .btn-sm{height:40px;font-size:14px;padding-inline:16px}

  .cmdbar{display:flex;align-items:flex-end;gap:var(--sp4);flex-wrap:wrap;padding:var(--sp5) 0 var(--sp4)}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13px;font-weight:600;color:var(--text-2)}
  .field .control{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r);height:48px;padding-inline:14px;transition:.15s var(--ease)}
  .field .control:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .field input,.field select{border:0;outline:0;background:transparent;font-family:inherit;font-size:15px;color:var(--text);height:100%;min-width:0}
  .field.search{flex:1;min-width:240px}
  .field.search input{width:100%}
  .range{display:flex;align-items:center;gap:8px}
  .range .dash{color:var(--text-3)}
  .hs-chip{font-family:var(--mono);font-size:13px;font-weight:600;background:var(--primary-soft);color:var(--primary);padding:4px 9px;border-radius:5px;direction:ltr}

  /* My Product card */
  .myprod{background:var(--surface);border:1px solid var(--border);border-inline-start:4px solid var(--brand);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:var(--sp5);margin-bottom:var(--sp5);display:grid;grid-template-columns:1fr auto;gap:var(--sp4);align-items:center}
  @media(max-width:760px){.myprod{grid-template-columns:1fr}}
  .mp-l{display:flex;flex-direction:column;gap:10px;min-width:0}
  .mp-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .mp-title .nm{font-size:19px;font-weight:700}
  .mp-econ{display:flex;flex-wrap:wrap;gap:8px 20px}
  .mp-econ .e{display:flex;flex-direction:column}
  .mp-econ .e .k{font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .mp-econ .e .v{font-size:17px;font-weight:600}
  .mp-r{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .tierbadge{font-size:12px;font-weight:700;padding:4px 11px;border-radius:40px;background:var(--brand-soft);color:var(--brand);letter-spacing:.02em}

  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp4);margin-bottom:var(--sp5)}
  @media(max-width:900px){.tiles{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.tiles{grid-template-columns:1fr}}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp5);display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);animation:slideup .3s var(--ease) both}
  .tile .k{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
  .tile .v{font-size:28px;font-weight:700;line-height:1.1}
  .tile .m{font-size:13px;color:var(--text-2)}
  .tile.accent{border-inline-start:4px solid var(--primary)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
  .eyebrow{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--primary)}
  .section-gap{display:flex;flex-direction:column;gap:var(--sp5);padding-bottom:var(--sp7)}

  .decision{padding:var(--sp6);position:relative;overflow:hidden}
  .decision::before{content:"";position:absolute;inset-block-start:0;inset-inline:0;height:4px;background:var(--success)}
  .d-head{display:flex;align-items:center;gap:var(--sp3);flex-wrap:wrap;margin-bottom:var(--sp4)}
  .badge{font-size:13px;font-weight:700;padding:6px 14px;border-radius:40px}
  .b-go{background:var(--success-soft);color:var(--success)}
  .b-info{background:var(--info-soft);color:var(--info)}
  .tag{font-size:13px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:5px 12px;border-radius:40px}
  .d-grid{display:grid;grid-template-columns:1fr 200px;gap:var(--sp6);align-items:center}
  @media(max-width:760px){.d-grid{grid-template-columns:1fr}}
  .d-verdict{font-size:26px;font-weight:700;line-height:1.3;text-wrap:balance;margin:0 0 var(--sp3)}
  .d-why{font-size:16px;color:var(--text-2);line-height:1.7;max-width:64ch}
  .d-brief{margin:var(--sp4) 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
  .d-brief li{font-size:15px;color:var(--text-2);padding-inline-start:22px;position:relative;line-height:1.6}
  .d-brief li::before{content:"";position:absolute;inset-inline-start:0;top:9px;width:8px;height:8px;border-radius:2px;background:var(--primary)}
  .gauge{width:180px;height:180px;border-radius:50%;display:grid;place-items:center;margin-inline:auto;background:conic-gradient(var(--primary) calc(var(--p,70)*1%),var(--border) 0)}
  .gauge .in{width:142px;height:142px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .gauge .n{font-family:var(--mono);font-size:38px;font-weight:600;line-height:1}
  .gauge .l{font-size:13px;color:var(--text-3);margin-top:4px}
  .d-actions{display:flex;gap:var(--sp3);flex-wrap:wrap;margin-top:var(--sp5)}

  .pipe{padding:var(--sp5) var(--sp6)}
  .pipe-head{display:flex;align-items:center;justify-content:space-between;gap:var(--sp3);flex-wrap:wrap;margin-bottom:var(--sp5)}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:7px 14px;border-radius:40px;background:var(--success-soft);color:var(--success)}
  .status .dot{width:8px;height:8px;border-radius:50%;background:currentColor}
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--sp3)}
  @media(max-width:860px){.steps{grid-template-columns:repeat(2,1fr)}}
  .step{padding:var(--sp4);border-radius:var(--r-lg);background:var(--surface-2);border:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .step.gap{background:var(--warning-soft);border-color:transparent}
  .step .sn{display:flex;align-items:center;gap:8px}
  .step .sn b{font-size:15px;font-weight:600}
  .step .num-badge{width:24px;height:24px;border-radius:6px;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;flex:none}
  .step .sd{font-size:13px;color:var(--text-3);line-height:1.45}
  .step .sf{display:flex;align-items:center;gap:7px;font-size:13px;margin-top:2px}
  .step .sf .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .step .sf b{font-family:var(--mono)}

  .body-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--sp4);align-items:start}
  @media(max-width:960px){.body-grid{grid-template-columns:1fr}}

  .dt-head{display:flex;align-items:center;justify-content:space-between;padding:var(--sp4) var(--sp5);border-bottom:1px solid var(--border)}
  .dt-head h3{margin:0;font-size:18px;font-weight:600}
  .dt-head .cnt{font-size:14px;color:var(--text-3)}
  table.dt{width:100%;border-collapse:collapse}
  table.dt th{font-size:13px;font-weight:600;color:var(--text-2);text-align:start;padding:12px var(--sp5);background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
  table.dt td{padding:14px var(--sp5);border-bottom:1px solid var(--border);font-size:15px;vertical-align:middle}
  table.dt tr{cursor:pointer;transition:background .12s var(--ease)}
  table.dt tbody tr:hover{background:var(--hover)}
  table.dt tr.sel{background:var(--primary-soft);box-shadow:inset 3px 0 0 var(--primary)}
  .rk{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--primary)}
  .cty{display:flex;align-items:center;gap:10px}
  .flag{font-family:var(--mono);font-size:12px;background:var(--surface-2);border:1px solid var(--border);padding:3px 7px;border-radius:5px;color:var(--text-2);direction:ltr}
  .cname{font-weight:600}
  .gap-txt{color:var(--text-3);border-bottom:1px dotted var(--text-3);cursor:help;font-size:14px}
  .bar{display:flex;align-items:center;gap:10px}
  .bar .bv{font-family:var(--mono);font-weight:600;color:var(--primary);min-width:28px}
  .bar .track{flex:1;min-width:50px;height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden}
  .bar .fill{height:100%;background:var(--primary);border-radius:5px;transition:width .5s var(--ease)}
  .trend{display:flex;align-items:center;gap:8px}
  .growth{font-family:var(--mono);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
  .growth.up{color:var(--success)} .growth.down{color:var(--danger)}
  .cov{font-size:13px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 10px;border-radius:40px;white-space:nowrap}
  .cov.mid{color:var(--warning);background:var(--warning-soft);border-color:transparent}
  .dt-foot{padding:12px var(--sp5);font-size:13px;color:var(--text-3);font-family:var(--mono);border-top:1px solid var(--border);direction:ltr;text-align:start}

  .detail{position:sticky;top:80px}
  .dpad{padding:var(--sp5)}
  .d-country{font-size:24px;font-weight:700;margin:0}
  .d-score{display:flex;align-items:baseline;gap:8px;margin:var(--sp3) 0}
  .d-score .n{font-family:var(--mono);font-size:48px;font-weight:600;color:var(--primary);line-height:.9}
  .d-score .o{font-size:18px;color:var(--text-3)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:var(--sp4) 0;overflow-x:auto}
  .tab{padding:12px 14px;font-size:14px;font-weight:600;color:var(--text-2);background:transparent;border:0;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s var(--ease)}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--primary);border-bottom-color:var(--primary)}
  .panel-body{animation:slideup .25s var(--ease) both}

  /* my position block */
  .mypos{background:var(--brand-soft);border-radius:var(--r-lg);padding:var(--sp4);margin-bottom:var(--sp4)}
  .mypos h4{margin:0 0 6px;font-size:15px;font-weight:700;color:var(--brand);display:flex;align-items:center;gap:8px}
  .mypos .big{font-size:15px;line-height:1.7}
  .mypos .big b{font-family:var(--mono)}

  .comp{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
  .comp-h{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .comp-nm{font-size:15px;font-weight:600}
  .comp-w{font-size:13px;color:var(--text-3)}
  .comp-v{font-size:20px;font-weight:700;margin-top:4px;font-family:var(--mono)}
  .gapline{display:inline-flex;align-items:center;gap:7px;margin-top:5px;font-size:14px;font-weight:600;color:var(--warning)}
  .gapline .dot{width:7px;height:7px;border-radius:50%;background:var(--warning)}
  .prov{font-size:13px;color:var(--text-3);font-family:var(--mono);margin-top:6px;direction:ltr;text-align:start}

  /* competing-products price ladder */
  .ladder{width:100%;border-collapse:collapse;margin-top:6px}
  .ladder th{font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;text-align:start;padding:8px 10px;border-bottom:1px solid var(--border)}
  .ladder td{padding:11px 10px;border-bottom:1px solid var(--border);font-size:14px}
  .ladder tr.you{background:var(--brand-soft)}
  .ladder tr.you td{font-weight:700}
  .ladder .you-tag{font-size:11px;font-weight:700;color:#fff;background:var(--brand);padding:2px 7px;border-radius:40px;margin-inline-start:6px}
  .ladder .pill{font-size:11px;padding:2px 8px;border-radius:40px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2)}
  .ladder .mgn{font-family:var(--mono);font-weight:600;color:var(--success)}

  .subhead{font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 8px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:15px}
  .kv:last-child{border-bottom:0}
  .kv .kk{color:var(--text-2)} .kv .vv{font-weight:600}
  .list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:12px}
  .list li{font-size:15px;line-height:1.6;padding-inline-start:20px;position:relative}
  .list li::before{content:"";position:absolute;inset-inline-start:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--primary)}
  .supplier{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
  .supplier:last-child{border-bottom:0}
  .supplier .sh{font-family:var(--mono);font-weight:600;color:var(--primary)}
  .callout{font-size:14px;color:var(--text-2);background:var(--info-soft);border-inline-start:3px solid var(--info);border-radius:var(--r);padding:12px 14px;line-height:1.6;margin-top:var(--sp3)}

  .duo{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp4)}
  @media(max-width:960px){.duo{grid-template-columns:1fr}}
  .panel{padding:var(--sp5)}
  .panel h3{margin:0 0 6px;font-size:18px;font-weight:600}
  .panel .sub{font-size:14px;color:var(--text-2);margin-bottom:var(--sp4);line-height:1.6}
  .limits{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:12px}
  .limits li{font-size:15px;color:var(--text);line-height:1.6;padding-inline-start:22px;position:relative}
  .limits li::before{content:"—";position:absolute;inset-inline-start:0;color:var(--warning);font-weight:700}

  .notice{font-size:14px;color:var(--text-2);background:var(--surface);border:1px solid var(--border);border-inline-start:3px solid var(--primary);border-radius:var(--r);padding:14px 16px;line-height:1.6;box-shadow:var(--shadow)}
  .toast{position:fixed;inset-block-end:24px;inset-inline-end:24px;background:var(--text);color:var(--bg);padding:14px 20px;border-radius:var(--r);font-size:15px;font-weight:600;box-shadow:var(--shadow-lg);z-index:100;animation:slideup .25s var(--ease);max-width:90vw}
  footer{border-top:1px solid var(--border);padding:var(--sp5) 0;color:var(--text-3);font-size:14px}
</style>

      {k:t("tMargin"),v:'<span class="num" style="color:var(--success)">'+bestMargin(top)+'%</span>',m:t("tMarginM")}
    ];
    $("#tiles").innerHTML=data.map(function(d,i){
      return '<div class="tile'+(d.accent?" accent":"")+'" style="animation-delay:'+(i*40)+'ms">'+
        '<div class="k">'+esc(d.k)+'</div><div class="v">'+d.v+'</div><div class="m">'+esc(d.m)+'</div></div>';
    }).join("");
  }
  function renderDecision(){
    $("#decision").innerHTML=
      '<div class="d-head"><span class="badge b-go">'+esc(t("prelim"))+'</span>'+
        '<span class="tag num">HS 080410 · 0.92</span><span class="tag num">2019–2023</span>'+
        '<span class="tag">'+esc(t("correlated"))+'</span></div>'+
      '<div class="d-grid"><div>'+
        '<div class="eyebrow">'+esc(t("decision"))+'</div>'+
        '<h1 class="d-verdict" style="margin-top:8px">'+esc(t("verdict"))+'</h1>'+
        '<p class="d-why"><b>'+esc(t("whyLabel"))+':</b> '+esc(t("why"))+'</p>'+
        '<ul class="d-brief"><li>'+esc(t("brief1"))+'</li><li>'+esc(t("brief2"))+'</li><li>'+esc(t("brief3"))+'</li></ul>'+
        '<div class="d-actions">'+
          '<button class="btn btn-primary" data-toast="deepen">'+esc(t("deepen"))+'</button>'+
          '<button class="btn btn-secondary" data-toast="wordReport">'+esc(t("wordReport"))+'</button>'+
          '<button class="btn btn-ghost" data-toast="brief">'+esc(t("brief"))+'</button>'+
          '<button class="btn btn-ghost" data-toast="exportCsv">'+esc(t("exportCsv"))+'</button></div></div>'+
        '<div class="gauge" style="--p:78" role="img" aria-label="0.78"><div class="in"><div><div class="n">0.78</div><div class="l">'+esc(t("decision"))+'</div></div></div></div>'+
      '</div>';
  }
  function renderPipe(){
    var steps=[
      {n:"1",nm:t("step1"),d:t("step1d"),c:"var(--success)",f:"<b class='num'>080410</b> · 0.92"},
      {n:"2",nm:t("step2"),d:t("step2d"),c:"var(--success)",f:"<b class='num'>4/4</b> "+t("obsMarkets")},
      {n:"3",nm:t("step3"),d:t("step3d"),c:"var(--success)",f:"<b class='num'>4/4</b> "+t("obsMarkets")},
      {n:"4",nm:t("step4"),d:t("step4d"),c:"var(--warning)",f:t("declaredGap")+" · <b class='num'>3/4</b>",gap:true},
      {n:"5",nm:t("step5"),d:t("step5d"),c:"var(--brand)",f:t("correlated")}
    ];
    $("#pipe").innerHTML=
      '<div class="pipe-head"><div class="eyebrow">'+esc(t("pipeline"))+'</div>'+
        '<span class="status"><span class="dot"></span>'+esc(t("complete"))+'</span></div>'+
      '<div class="steps">'+steps.map(function(s){
        return '<div class="step'+(s.gap?" gap":"")+'"><div class="sn"><span class="num-badge"'+(s.n==="5"?' style="background:var(--brand)"':'')+'>'+s.n+'</span><b>'+esc(s.nm)+'</b></div>'+
          '<div class="sd">'+esc(s.d)+'</div><div class="sf"><span class="dot" style="background:'+s.c+'"></span><span>'+s.f+'</span></div></div>';
      }).join("")+'</div>';
  }
  function renderTable(){
    var rows=MARKETS.map(function(m,i){
      var g=growth(m.importsSeries);
      var share=m.shareGap?'<span class="gap-txt" title="Comtrade · 0.0">'+esc(t("notObserved"))+'</span>':
        '<span class="num" style="font-weight:600'+(m.shareSeries[4]>=30?';color:var(--primary)':'')+'">'+m.shareSeries[4]+'%</span>';
      return '<tr class="'+(i===S.sel?"sel":"")+'" data-i="'+i+'">'+
        '<td><span class="rk">'+(i+1)+'</span></td>'+
        '<td><div class="cty"><span class="flag">'+m.flag+'</span><span class="cname">'+esc(m.name[S.lang])+'</span></div></td>'+
        '<td><span class="num" style="font-weight:600" title="UN Comtrade · 0.9">$'+m.importsSeries[4]+'M</span></td>'+
        '<td><div class="trend">'+spark(m.importsSeries,64,26,"var(--primary)")+growthTag(g)+'</div></td>'+
        '<td>'+share+'</td>'+
        '<td><div class="bar"><span class="bv">'+m.score+'</span><span class="track"><span class="fill" style="width:'+m.score+'%"></span></span></div></td>'+
        '<td><span class="num" style="font-weight:600;color:var(--success)">'+bestMargin(m)+'%</span></td></tr>';
    }).join("");
    $("#tableCard").innerHTML=
      '<div class="dt-head"><h3>'+esc(t("rankedMarkets"))+'</h3><span class="cnt"><span class="num">4</span> · 2019–2023</span></div>'+
      '<div style="overflow-x:auto"><table class="dt"><thead><tr>'+
        '<th>'+esc(t("colRank"))+'</th><th>'+esc(t("colMarket"))+'</th><th>'+esc(t("colImports"))+'</th>'+
        '<th>'+esc(t("colTrend"))+'</th><th>'+esc(t("colShare"))+'</th><th>'+esc(t("colScore"))+'</th><th>'+esc(t("colMargin"))+'</th>'+
        '</tr></thead><tbody>'+rows+'</tbody></table></div>'+
      '<div class="dt-foot">'+esc(t("tableSrc"))+'</div>';
    $$("#tableCard tbody tr").forEach(function(tr){tr.addEventListener("click",function(){S.sel=+this.getAttribute("data-i");renderTable();renderDetail();});});
  }
  var TIERK={prem:"tierPrem",std:"tierStd",eco:"tierEco"};
  function renderDetail(){
    var m=MARKETS[S.sel];
    var tabs=[["position",t("tabPosition")],["rivals",t("tabRivals")],["trend",t("tabTrend")],["components",t("tabComponents")],["compliance",t("tabCompliance")]];
    var body="";
    if(S.tab==="position"){
      var mm=m.rivals.map(function(r){return {brand:r.brand,mgn:marginAt(r.price)};});
      body='<div class="mypos"><h4><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>'+esc(t("yourSlot"))+'</h4>'+
        '<div class="big">'+t("slotLine")+'</div></div>'+
        '<div class="subhead">'+esc(t("matchMargins"))+'</div>'+
        m.rivals.map(function(r){return '<div class="kv"><span class="kk">'+esc(r.brand)+' <span class="ladder"><span class="pill">'+esc(t(TIERK[r.tier]))+'</span></span> · <span class="num">'+r.price+' '+MY.cur+'</span></span>'+
          '<span class="vv num" style="color:var(--success)">'+marginAt(r.price)+'%</span></div>';}).join("")+
        '<div class="callout">'+esc(t("rivalHint"))+'</div>';
    }else if(S.tab==="rivals"){
      // price ladder with YOUR product inserted, sorted desc
      var ladder=m.rivals.map(function(r){return {brand:r.brand,tier:r.tier,price:r.price,you:false};});
      ladder.push({brand:t("myProdName"),tier:"prem",price:MY.price,you:true});
      ladder.sort(function(a,b){return b.price-a.price;});
      var rows=ladder.map(function(r){
        return '<tr class="'+(r.you?"you":"")+'"><td>'+esc(r.brand)+(r.you?'<span class="you-tag">'+esc(t("youLabel"))+'</span>':'')+'</td>'+
          '<td><span class="pill">'+esc(t(TIERK[r.tier]))+'</span></td>'+
          '<td class="num">'+r.price+' '+MY.cur+'</td>'+
          '<td>'+(r.you?'<span class="num" style="color:var(--brand);font-weight:700">'+marginAt(r.price)+'%</span>':'<span class="mgn">'+marginAt(r.price)+'%</span>')+'</td></tr>';
      }).join("");
      body='<div class="subhead">'+esc(t("onShelf"))+'</div>'+
        '<div style="overflow-x:auto"><table class="ladder"><thead><tr><th>'+esc(t("colBrand"))+'</th><th>'+esc(t("colTier"))+'</th><th>'+esc(t("colPrice"))+'</th><th>'+esc(t("colYourMgn"))+'</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
        '<div class="subhead">'+esc(t("supplierCountries"))+'</div>'+
        m.suppliers.map(function(s){return '<div class="supplier"><span>'+esc(s.c[S.lang])+(s.c.en==="Saudi Arabia"?' <span class="you-tag" style="background:var(--brand)">'+esc(t("youLabel"))+'</span>':'')+'</span><span class="sh">'+s.sh+'%</span></div>';}).join("")+
        '<div class="callout" style="border-color:var(--warning);background:var(--warning-soft)">'+esc(t("rivalSrc"))+'</div>';
    }else if(S.tab==="trend"){
      body='<div class="subhead">'+esc(t("trendTitle"))+'</div>'+
        '<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--text-2)">'+esc(t("importsLine"))+'</span><span class="growth up">▲ '+growth(m.importsSeries)+'% · '+esc(t("cagr"))+' '+cagr(m.importsSeries)+'%</span></div>'+
          spark(m.importsSeries,320,60,"var(--primary)")+
          '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);margin-top:4px" class="num">'+YEARS.map(function(y){return '<span>'+y+'</span>';}).join("")+'</div>'+
        '</div>'+
        '<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-top:12px">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--text-2)">'+esc(t("shareLine"))+'</span>'+(m.shareGap?'<span class="gap-txt">'+esc(t("notObserved"))+'</span>':'<span class="growth up">'+m.shareSeries[0]+'% → '+m.shareSeries[4]+'%</span>')+'</div>'+
          (m.shareGap?'<div class="gapline"><span class="dot"></span>'+esc(t("notObserved"))+'</div>':spark(m.shareSeries,320,50,"var(--brand)"))+
        '</div>'+
        '<div class="callout">'+esc(t("trendRead"))+'</div>';
    }else if(S.tab==="components"){
      function comp(nm,w,val,prov,gap,note){
        if(gap)return '<div class="comp"><div class="comp-h"><span class="comp-nm">'+esc(nm)+'</span><span class="comp-w">'+esc(w)+'</span></div><div class="gapline"><span class="dot"></span>'+esc(t("declaredGap"))+'</div><div class="prov">Comtrade · 0.0 — '+esc(note)+'</div></div>';
        return '<div class="comp"><div class="comp-h"><span class="comp-nm">'+esc(nm)+'</span><span class="comp-w">'+esc(w)+'</span></div><div class="comp-v">'+val+'</div><div class="prov">'+esc(prov)+'</div></div>';
      }
      body=comp(t("compSize"),t("wSize"),'<span class="num">$'+m.importsSeries[4]+'M</span>',"UN Comtrade · 0.9 · 2023")+
        (m.shareGap?comp(t("compShare"),t("wShare"),"",null,true,t("hhiNote")):comp(t("compShare"),t("wShare"),'<span class="num">'+m.shareSeries[4]+'%</span>',"UN Comtrade · 0.9 · 2023"))+
        comp(t("compIncome"),t("wIncome"),'<span class="num">'+m.income+'</span>',"World Bank · 0.95 · 2023")+
        (m.hhiGap?comp(t("compHHI"),t("wHHI"),"",null,true,t("hhiNote")):comp(t("compHHI"),t("wHHI"),'<span class="num">0.21</span>',"UN Comtrade · 0.8"));
    }else{
      body='<div class="subhead">'+esc(t("entryReq"))+'</div>'+
        '<ul class="list"><li>'+esc(t("req1"))+' <a href="#">'+esc(t("officialSrc"))+'</a></li><li>'+esc(t("req2"))+' <a href="#">'+esc(t("officialSrc"))+'</a></li></ul>'+
        '<div class="subhead">'+esc(t("exitReq"))+'</div>'+
        '<ul class="list"><li>'+esc(t("req3"))+' <a href="#">'+esc(t("officialSrc"))+'</a></li></ul>'+
        '<div class="callout" style="border-color:var(--warning);background:var(--warning-soft)">'+esc(t("complianceFoot"))+'</div>';
    }
    $("#detailCard").innerHTML='<div class="dpad">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span class="flag">'+m.flag+'</span><span class="tag">'+esc(t("rank"))+' '+(S.sel+1)+'</span></div>'+
      '<h2 class="d-country">'+esc(m.name[S.lang])+'</h2>'+
      '<div class="d-score"><span class="n">'+m.score+'</span><span class="o">/100</span></div>'+
      '<div class="tabs">'+tabs.map(function(tb){return '<button class="tab'+(tb[0]===S.tab?" on":"")+'" data-tab="'+tb[0]+'">'+esc(tb[1])+'</button>';}).join("")+'</div>'+
      '<div class="panel-body">'+body+'</div></div>';
    $$("#detailCard .tab").forEach(function(b){b.addEventListener("click",function(){S.tab=this.getAttribute("data-tab");renderDetail();});});
  }
  function renderDuo(){
    $("#duo").innerHTML=
      '<section class="card panel"><h3>'+esc(t("reportLimits"))+'</h3><div class="sub">'+esc(t("limitsSub"))+'</div>'+
        '<ul class="limits"><li>'+esc(t("lim1"))+'</li><li>'+esc(t("lim2"))+'</li><li>'+esc(t("lim3"))+'</li><li>'+esc(t("lim4"))+'</li></ul></section>'+
      '<section class="card panel"><h3>'+esc(t("whatsNext"))+'</h3><div class="sub">'+esc(t("nextSub"))+'</div>'+
        '<ul class="list"><li>'+esc(t("next1"))+'</li><li>'+esc(t("next2"))+'</li></ul>'+
        '<button class="btn btn-primary" style="margin-top:16px" data-toast="deepen">'+esc(t("deepen"))+'</button></section>';
  }
  function renderAll(){applyChrome();renderMyProduct();renderTiles();renderDecision();renderPipe();renderTable();renderDetail();renderDuo();bindToasts();}

  function toast(msg){var el=document.createElement("div");el.className="toast";el.textContent=msg;document.body.appendChild(el);
    setTimeout(function(){el.style.transition="opacity .3s";el.style.opacity="0";setTimeout(function(){el.remove();},300);},1800);}
  function bindToasts(){$$("[data-toast]").forEach(function(b){b.addEventListener("click",function(){toast(t(this.getAttribute("data-toast"))+" ✓");});});}
  $$("#langSeg button").forEach(function(b){b.addEventListener("click",function(){S.lang=this.getAttribute("data-lang");renderAll();toast(t("toastLang"));});});
  $("#themeBtn").addEventListener("click",function(){var cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");});
  $("#runBtn").addEventListener("click",function(){toast(t("analyze")+" ✓");});

  renderAll();
})();
</script>
</body>
</html>
